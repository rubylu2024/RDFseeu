<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 红蜻蜓论坛</title>
    <link rel="icon" type="image/png" href="images/红蜻蜓.png">
    <link rel="stylesheet" href="styles.css?v=20260506-2">
    <style>
        /* 注册页面样式 */
        .register-container {
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border: 1px solid #000;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ccc;
        }
        
        .register-header h2 {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .register-header p {
            font-size: 14px;
            color: #666;
        }
        
        .register-form .form-group {
            margin-bottom: 15px;
        }
        
        .register-form .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        
        .register-form .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .register-form .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #990000;
            font-size: 16px;
            box-sizing: border-box;
        }

        .register-form .form-group .input-wrapper input {
            padding-right: 44px;
        }
        
        .register-form .form-group input.error {
            border-color: #cc0000;
            background-color: #ffe6e6;
        }
        
        .register-form .form-group input:focus {
            outline: none;
            border-color: #cc0000;
        }
        
        .register-form .form-group .toggle-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            background-color: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            border-radius: 50%;
        }
        
        .register-form .form-group .toggle-btn:hover {
            background-color: rgba(204, 0, 0, 0.08);
            color: #cc0000;
        }

        .register-form .form-group .toggle-btn:focus {
            outline: none;
            background-color: rgba(204, 0, 0, 0.12);
            color: #cc0000;
        }

        .register-form .form-group .toggle-btn svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        
        .register-btn {
            width: 100%;
            background-color: #cc0000;
            color: white;
            border: 1px solid #990000;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .register-btn:hover:not(:disabled) {
            background-color: #990000;
        }
        
        .register-btn:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        
        .register-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }
        
        .register-footer p {
            font-size: 14px;
            color: #666;
        }
        
        .register-footer a {
            color: #0066cc;
            text-decoration: none;
        }
        
        .register-footer a:hover {
            text-decoration: underline;
            color: #cc0000;
        }
        
        .error-message {
            background-color: #ffe6e6;
            color: #cc0000;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ffcccc;
            font-size: 14px;
        }
        
        .success-message {
            background-color: #e6ffe6;
            color: #006600;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccffcc;
            font-size: 14px;
        }
        
        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #cc0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="forum-frame-outer">
        <div class="forum-content">
            <div class="forum-frame">
                <!-- 顶部导航栏 -->
                <div class="top-nav">
                    <div class="top-nav-container">
                        <div class="logo">
                            <div class="logo-image"></div>
                            <a href="index.html">红蜻蜓论坛</a>
                            <a href="index.html" class="logo-sub">www.reddragonfly.cyou</a>
                        </div>
                        <div class="top-links">
                            <a href="index.html">论坛</a>
                            <a href="#">博客</a>
                            <a href="#">问答</a>
                            <a href="https://www.4399.com" target="_blank">游戏厅</a>
                            <a href="#">品牌</a>
                            <a href="#">更多</a>
                        </div>
                        <div class="search-box">
                                <input type="text" placeholder="搜帖、找人、搜版块">
                                <button>搜索</button>
                            </div>
                        <div class="user-links">
                            <button id="audio-toggle" class="audio-toggle">
                                <span class="audio-icon">♪</span>
                            </button>
                            <a href="#">服务</a>
                            <div id="user-links-container">
                                <a href="login.html" id="login-btn">登录</a>
                                <a href="register.html" id="register-btn">注册</a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 主要内容区 -->
                <div class="main-container">
                    <div class="main-content" style="display: flex; justify-content: center; align-items: center; min-height: 600px;">
                        <div class="register-container">
                            <div class="register-header">
                                <h2>用户注册</h2>
                                <p>注册后请前往邮箱激活账号，激活完成后才可正常使用论坛功能</p>
                            </div>
                            
                            <form class="register-form" id="register-form">
                                <div id="message-container"></div>
                                
                                <div class="form-group">
                                    <label for="username">用户名</label>
                                    <input type="text" id="username" name="username" required placeholder="仅支持字母和数字，3-30个字符" maxlength="30" autocomplete="username" spellcheck="false">
                                </div>

                                <div class="form-group">
                                    <label for="nickname">昵称 <span style="font-weight: normal; color: #999;">（选填）</span></label>
                                    <input type="text" id="nickname" name="nickname" placeholder="帖子里显示的名字，留空将默认使用用户名">
                                </div>
                                
                                <div class="form-group">
                                    <label for="email">邮箱</label>
                                    <input type="email" id="email" name="email" required placeholder="用于激活账号和找回密码">
                                    <div style="margin-top: 6px; font-size: 12px; color: #666;">请填写常用邮箱，注册后需通过邮箱激活账号，后续也可用于找回密码。</div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="password">密码</label>
                                    <div class="input-wrapper">
                                        <input type="password" id="password" name="password" required placeholder="请至少包含一个字母，长度至少8位">
                                        <button type="button" class="toggle-btn" id="toggle-password" aria-label="显示密码" title="显示密码"></button>
                                    </div>
                                    <div style="margin-top: 6px; font-size: 12px; color: #666;">密码可使用英文字母、数字和常见英文符号，例如 `! @ # $ % ^ & * _ - + = ? .`，建议使用英文输入法填写。</div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="confirm-password">确认密码</label>
                                    <div class="input-wrapper">
                                        <input type="password" id="confirm-password" name="confirm-password" required placeholder="请再次输入密码">
                                        <button type="button" class="toggle-btn" id="toggle-confirm-password" aria-label="显示确认密码" title="显示确认密码"></button>
                                    </div>
                                </div>
                                
                                <button type="submit" class="register-btn" id="register-btn-submit">注册</button>
                            </form>
                            
                            <div class="register-footer">
                                <p>已有账号？ <a href="login.html">立即登录</a></p>
                                <p><a href="index.html">返回首页</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js?v=20260509-1"></script>
    <script>
        const errorMap = {
            validation_error: '注册信息不符合要求，请检查用户名、邮箱或密码',
            username_taken: '这个用户名已经被使用',
            email_taken: '这个邮箱已经注册过',
            csrf_token_mismatch: '注册验证失败，请刷新页面后重试',
            permission_denied: '当前论坛暂不允许注册',
            rate_limit_exceeded: '操作太频繁，请稍后再试'
        };

        async function customRegister(username, nickname, email, password) {
            const response = await fetch('/custom-register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, nickname, email, password })
            });

            const result = await response.json();
            if (!response.ok) {
                const error = new Error('注册失败');
                error.result = result;
                throw error;
            }
            return result;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            const messageContainer = document.getElementById('message-container');
            const usernameInput = document.getElementById('username');
            const nicknameInput = document.getElementById('nickname');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm-password');
            const submitBtn = document.getElementById('register-btn-submit');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const toggleConfirmPasswordBtn = document.getElementById('toggle-confirm-password');
            const loginLink = document.querySelector('.register-footer a[href="login.html"]');

            try {
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect');
                if (redirect && loginLink) {
                    loginLink.href = `login.html?redirect=${encodeURIComponent(redirect)}`;
                }
            } catch (_) {}

            function getEyeIconMarkup(isVisible) {
                if (isVisible) {
                    return `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                            <path d="M9.4 5.2A10.7 10.7 0 0 1 12 5c5.5 0 9.5 5 10 7-.2.8-1 2.1-2.2 3.4"></path>
                            <path d="M6.2 6.3C4.1 7.8 2.6 9.9 2 12c.7 2.7 4.7 7 10 7 1.6 0 3-.3 4.3-.9"></path>
                        </svg>
                    `;
                }

                return `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                `;
            }

            function setPasswordVisibility(button, input, isVisible, fieldLabel) {
                input.type = isVisible ? 'text' : 'password';
                button.innerHTML = getEyeIconMarkup(isVisible);
                button.setAttribute('aria-label', isVisible ? `隐藏${fieldLabel}` : `显示${fieldLabel}`);
                button.setAttribute('title', isVisible ? `隐藏${fieldLabel}` : `显示${fieldLabel}`);
            }

            function sanitizeUsername(value) {
                return String(value || '').replace(/[^a-zA-Z0-9]/g, '');
            }

            setPasswordVisibility(togglePasswordBtn, passwordInput, false, '密码');
            setPasswordVisibility(toggleConfirmPasswordBtn, confirmPasswordInput, false, '确认密码');

            usernameInput.addEventListener('input', function() {
                const sanitized = sanitizeUsername(usernameInput.value);
                if (sanitized !== usernameInput.value) {
                    usernameInput.value = sanitized;
                    showMessage('用户名只能输入英文字母和数字，不能输入中文', 'error');
                }
            });

            // 密码明文切换
            togglePasswordBtn.addEventListener('click', function() {
                setPasswordVisibility(togglePasswordBtn, passwordInput, passwordInput.type === 'password', '密码');
            });

            toggleConfirmPasswordBtn.addEventListener('click', function() {
                setPasswordVisibility(toggleConfirmPasswordBtn, confirmPasswordInput, confirmPasswordInput.type === 'password', '确认密码');
            });

            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = sanitizeUsername(usernameInput.value);
                const nickname = nicknameInput.value;
                const email = emailInput.value;
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (username !== usernameInput.value) {
                    usernameInput.value = username;
                }

                // 重置输入框状态
                [usernameInput, nicknameInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => input.classList.remove('error'));

                // 前端校验
                const validationError = validateForm(username, nickname, email, password, confirmPassword);
                if (validationError) {
                    showMessage(validationError.message, 'error');
                    if (validationError.field) {
                        validationError.field.classList.add('error');
                    }
                    return;
                }

                // 禁用按钮
                submitBtn.disabled = true;
                submitBtn.textContent = '注册中...';
                showLoading();

                try {
                    const trimmedUsername = username.trim();
                    const normalizedNickname = nickname.trim() || trimmedUsername;

                    await customRegister(trimmedUsername, normalizedNickname, email.trim(), password);
                    const loginSuccess = typeof flarumLogin === 'function'
                        ? await flarumLogin(trimmedUsername, password)
                        : false;

                    if (!loginSuccess) {
                        showMessage('注册成功，但自动登录失败，请返回登录页面手动登录。', 'success');
                        return;
                    }

                    const redirectUrl = typeof resolveAuthReturnUrl === 'function' ? resolveAuthReturnUrl() : 'index.html';
                    if (typeof showUiToast === 'function') {
                        showUiToast({
                            type: 'success',
                            message: '注册成功，已为你自动登录。\n请前往邮箱激活账号后再正常发帖/回帖。',
                            messageFormatter: (secondsLeft) => `注册成功，已为你自动登录。\n请前往邮箱激活账号后再正常发帖/回帖。\n${secondsLeft} 秒后将自动返回之前的页面。`,
                            actionText: '立即返回（10s）',
                            actionTextFormatter: (secondsLeft) => `立即返回（${secondsLeft}s）`,
                            onAction: () => { window.location.href = redirectUrl; },
                            autoCloseMs: 10000
                        });
                    }

                    window.setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 10000);
                } catch (error) {
                    console.error('注册失败:', error);
                    let errorMsg = '注册失败';
                    if (error.result) {
                        if (error.result.errors && error.result.errors.length > 0) {
                            errorMsg = error.result.errors.map(e => {
                                if (e.detail) return e.detail;
                                if (e.code && errorMap[e.code]) return errorMap[e.code];
                                if (e.title) return e.title;
                                if (typeof getFriendlyErrorMessage === 'function') {
                                    return getFriendlyErrorMessage({
                                        httpStatus: e.status ? Number(e.status) : null,
                                        apiError: {
                                            status: e.status ? Number(e.status) : null,
                                            code: e.code || '',
                                            title: e.title || '',
                                            detail: e.detail || ''
                                        }
                                    }, 'register');
                                }
                                return '注册失败，请稍后再试。';
                            }).join('\n');
                        } else if (error.result.message) {
                            errorMsg = error.result.message;
                        } else {
                            errorMsg = typeof getFriendlyErrorMessage === 'function'
                                ? getFriendlyErrorMessage(error, 'register')
                                : '注册失败，请稍后再试。';
                        }
                    } else if (error.message) {
                        errorMsg = typeof getFriendlyErrorMessage === 'function'
                            ? getFriendlyErrorMessage(error, 'register')
                            : error.message;
                    }
                    showMessage(errorMsg, 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '注册';
                    hideLoading();
                }
            });

            function validateForm(username, nickname, email, password, confirmPassword) {
                // 用户名校验
                if (!username || !username.trim()) {
                    return { message: '用户名不能为空', field: usernameInput };
                }
                const trimmedUsername = username.trim();
                if (trimmedUsername.length < 3 || trimmedUsername.length > 30) {
                    return { message: '用户名长度需为 3-30 个字符', field: usernameInput };
                }
                if (!/^[a-zA-Z0-9]+$/.test(trimmedUsername)) {
                    return { message: '用户名只能包含英文字母和数字', field: usernameInput };
                }
                if (/\s/.test(trimmedUsername)) {
                    return { message: '用户名不能包含空格', field: usernameInput };
                }

                // 昵称校验
                const trimmedNickname = nickname.trim();
                if (trimmedNickname.length > 30) {
                    return { message: '昵称最多可填写 30 个字符', field: nicknameInput };
                }
                if (/[\r\n\t]/.test(trimmedNickname)) {
                    return { message: '昵称格式不正确，请不要输入换行或制表符', field: nicknameInput };
                }

                // 邮箱校验
                if (!email || !email.trim()) {
                    return { message: '邮箱不能为空', field: emailInput };
                }
                const trimmedEmail = email.trim();
                if (/\s/.test(trimmedEmail)) {
                    return { message: '邮箱不能包含空格', field: emailInput };
                }
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(trimmedEmail)) {
                    return { message: '请输入正确的邮箱地址', field: emailInput };
                }

                // 密码校验
                if (!password) {
                    return { message: '密码不能为空', field: passwordInput };
                }
                if (!password.trim()) {
                    return { message: '密码不能全是空格', field: passwordInput };
                }
                if (password.length < 8) {
                    return { message: '密码长度至少 8 位', field: passwordInput };
                }
                if (!/[a-zA-Z]/.test(password)) {
                    return { message: '密码请至少包含一个字母', field: passwordInput };
                }

                // 确认密码校验
                if (!confirmPassword) {
                    return { message: '请再次输入密码', field: confirmPasswordInput };
                }
                if (confirmPassword !== password) {
                    return { message: '两次输入的密码不一致', field: confirmPasswordInput };
                }

                return null;
            }

            // 显示消息
            function showMessage(message, type) {
                messageContainer.innerHTML = `
                    <div class="${type === 'error' ? 'error-message' : 'success-message'}">
                        ${message.replace(/\n/g, '<br>')}
                    </div>
                `;
            }

            // 显示加载状态
            function showLoading() {
                const loadingOverlay = document.createElement('div');
                loadingOverlay.className = 'loading-overlay';
                loadingOverlay.id = 'loading-overlay';
                loadingOverlay.innerHTML = '<div class="loading-spinner"></div>';
                document.body.appendChild(loadingOverlay);
            }

            // 隐藏加载状态
            function hideLoading() {
                const loadingOverlay = document.getElementById('loading-overlay');
                if (loadingOverlay) {
                    loadingOverlay.remove();
                }
            }
        });
    </script>
</body>
</html>
