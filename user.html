<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户资料 - 红蜻蜓论坛</title>
    <link rel="stylesheet" href="styles.css?v=20260506-2">
    <style>
        .page-shell {
            width: 100%;
        }

        .public-user-card {
            background: #fff;
            border: 1px solid #ccc;
            padding: 20px;
        }

        .public-user-header {
            display: flex;
            gap: 16px;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
        }

        .public-user-avatar {
            width: 72px;
            height: 72px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #ddd;
            background: #f5f5f5;
            flex: 0 0 auto;
        }

        .public-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .public-user-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }

        .public-user-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            font-size: 13px;
            color: #666;
        }

        .public-user-bio {
            margin-top: 16px;
            padding: 12px;
            background: #fcfcfc;
            border: 1px solid #eee;
            line-height: 1.8;
            color: #333;
        }

        .public-user-grid {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .public-user-panel {
            border: 1px solid #eee;
            background: #fff;
        }

        .public-user-panel h3 {
            margin: 0;
            padding: 10px 12px;
            background: #eef5ff;
            border-left: 5px solid #0066cc;
            font-size: 16px;
            color: #333;
        }

        .public-user-list {
            list-style: none;
            margin: 0;
            padding: 10px 12px;
        }

        .public-user-list li {
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .public-user-list li:last-child {
            border-bottom: none;
        }

        .public-user-list a {
            color: #0066cc;
            text-decoration: none;
        }

        .public-user-list a:hover {
            text-decoration: underline;
        }

        .public-user-item-meta {
            margin-top: 4px;
            font-size: 12px;
            color: #888;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>
    <audio id="background-music" src="audio/红蜻蜓.mp3" loop>
        Your browser does not support the audio element.
    </audio>

    <div class="forum-frame-outer">
        <div class="forum-content">
            <div class="forum-frame">
                <div class="top-nav">
                    <div class="top-nav-container">
                        <div class="logo">
                            <div class="logo-image"></div>
                            <a href="index.html">红蜻蜓论坛</a>
                            <a href="index.html" class="logo-sub">www.reddragonfly.cyou</a>
                        </div>
                        <div class="top-links">
                            <a href="index.html">论坛</a>
                            <a href="#">博客</a>
                            <a href="#">问答</a>
                            <a href="https://www.4399.com" target="_blank">游戏厅</a>
                            <a href="#">品牌</a>
                            <a href="#">更多</a>
                        </div>
                        <div class="search-box">
                            <input type="text" placeholder="搜帖、找人、搜版块">
                            <button>搜索</button>
                        </div>
                        <div class="user-links">
                            <button id="audio-toggle" class="audio-toggle">
                                <span class="audio-icon">♪</span>
                            </button>
                            <a href="#">服务</a>
                            <div id="user-links-container">
                                <a href="login.html" id="login-btn">登录</a>
                                <a href="register.html" id="register-btn">注册</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="main-container">
                    <div class="right-content-area page-shell">
                        <div class="content-wrapper">
                            <div class="main-content" style="width:100%; padding: 20px;">
                                <div class="public-user-card" id="public-user-container">
                                    <div style="padding: 20px; text-align: center;">加载中...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-container">
                    <span>我的红蜻蜓</span>
                    <span class="status-right" style="position: relative; cursor: pointer;" onclick="window.location.href='message.html'">短消息<span class="unread-badge" style="display:none;">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260507-8"></script>
</body>
</html>
