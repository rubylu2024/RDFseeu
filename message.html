<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短消息箱 - 红蜻蜓论坛</title>
    <link rel="stylesheet" href="styles.css?v=20260506-2">
    <style>
        .page-shell {
            width: 100%;
        }

        .message-container {
            background: #fff;
            border: 1px solid #ccc;
            padding: 20px;
            min-height: 400px;
        }

        .message-header {
            border-bottom: 2px solid #cc0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .message-header h2 {
            margin: 0;
            font-size: 20px;
            color: #333;
        }

        .pm-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .pm-tabs {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .pm-tab,
        .pm-btn {
            padding: 5px 10px;
            border: 1px solid #6F6F6F;
            background: linear-gradient(to bottom, #DEDEDE, #C2C2C2);
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        .pm-tab.active {
            background: linear-gradient(to bottom, #FFE4E4, #FFCFCF);
            border-color: #cc0000;
            color: #990000;
        }

        .pm-btn.primary {
            border-color: #7d1d1d;
            background: linear-gradient(to bottom, #ffdddd, #ffb6b6);
            color: #7d1d1d;
            font-weight: bold;
        }

        .pm-layout {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .pm-list {
            width: 38%;
            min-width: 260px;
            border: 1px solid #ccc;
            background: #fff;
        }

        .pm-detail {
            flex: 1;
            border: 1px solid #ccc;
            background: #fff;
            min-height: 380px;
        }

        .pm-panel-head {
            padding: 8px 10px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .pm-panel-body {
            padding: 10px;
        }

        .pm-list-item {
            border-bottom: 1px dashed #eee;
            padding: 8px 10px;
            cursor: pointer;
        }

        .pm-list-item:last-child {
            border-bottom: none;
        }

        .pm-list-item.unread {
            border-left: 4px solid #cc0000;
        }

        .pm-list-item.unread.pm-private {
            background: #fff7f7;
        }

        .pm-list-item.unread .pm-list-title {
            font-weight: bold;
        }

        .pm-list-item.pm-read {
            opacity: 0.6;
        }

        .pm-list-item.pm-notify-reply {
            background: #fff;
        }

        .pm-list-item.pm-notify-quote {
            background: #eef6ff;
        }

        .pm-list-item.pm-notify-system {
            background: #fffbe6;
        }

        .pm-list-item.pm-public-notice,
        .pm-list-item.pm-public-event,
        .pm-list-item.pm-public-system {
            background: #fffbe6;
        }

        .pm-list-item.pm-public-warning {
            background: #ffecec;
        }

        .pm-list-title {
            font-size: 14px;
            color: #0066cc;
            margin-bottom: 4px;
        }

        .pm-list-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pm-detail-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .pm-thread {
            border: 1px solid #eee;
            background: #fcfcfc;
            padding: 10px;
            margin-top: 10px;
            max-height: 320px;
            overflow: auto;
        }

        .pm-post {
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .pm-post:last-child {
            border-bottom: none;
        }

        .pm-post-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .pm-post-author {
            color: #cc0000;
            font-weight: bold;
        }

        .pm-post-body {
            font-size: 14px;
            color: #333;
            line-height: 1.7;
        }

        .pm-form {
            margin-top: 12px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .pm-form label {
            font-size: 13px;
            color: #666;
            display: block;
            margin-bottom: 4px;
        }

        .pm-form input[type="text"],
        .pm-form select,
        .pm-form textarea {
            width: 100%;
            border: 1px solid #ccc;
            padding: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .pm-form textarea {
            min-height: 90px;
            resize: vertical;
        }

        .pm-form-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pm-hint {
            font-size: 12px;
            color: #888;
        }

        .pm-suggest-wrap {
            position: relative;
        }

        .pm-suggest {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 2px);
            border: 1px solid #ccc;
            background: #fff;
            z-index: 50;
            max-height: 180px;
            overflow: auto;
            display: none;
        }

        .pm-suggest-item {
            padding: 6px 8px;
            border-bottom: 1px dashed #eee;
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        .pm-suggest-item:last-child {
            border-bottom: none;
        }

        .pm-suggest-item:hover {
            background: #fff7f7;
        }

        .pm-empty {
            padding: 14px;
            text-align: center;
            color: #888;
        }

        .pm-alert {
            padding: 12px;
            border: 1px dashed #cc0000;
            background: #fff7f7;
            color: #cc0000;
            margin-bottom: 12px;
            display: none;
        }

        @media (max-width: 900px) {
            .pm-layout {
                flex-direction: column;
            }
            .pm-list {
                width: 100%;
            }
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 6px 16px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <audio id="background-music" src="audio/红蜻蜓.mp3" loop>
        Your browser does not support the audio element.
    </audio>

    <div class="forum-frame-outer">
        <div class="forum-content">
            <div class="forum-frame">
                <div class="top-nav">
                    <div class="top-nav-container">
                        <div class="logo">
                            <div class="logo-image"></div>
                            <a href="index.html">红蜻蜓论坛</a>
                            <a href="index.html" class="logo-sub">www.reddragonfly.cyou</a>
                        </div>
                        <div class="top-links">
                            <a href="index.html">论坛</a>
                            <a href="#">博客</a>
                            <a href="#">问答</a>
                            <a href="https://www.4399.com" target="_blank">游戏厅</a>
                            <a href="#">品牌</a>
                            <a href="#">更多</a>
                        </div>
                        <div class="search-box">
                            <input type="text" placeholder="搜帖、找人、搜版块">
                            <button>搜索</button>
                        </div>
                        <div class="user-links">
                            <button id="audio-toggle" class="audio-toggle">
                                <span class="audio-icon">♪</span>
                            </button>
                            <a href="#">服务</a>
                            <div id="user-links-container">
                                <a href="login.html" id="login-btn">登录</a>
                                <a href="register.html" id="register-btn">注册</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="main-container">
                    <div class="right-content-area page-shell">
                        <div class="content-wrapper">
                            <div class="main-content" style="width:100%; padding: 20px;">
                                <div class="message-container">
                                    <div class="message-header">
                                        <h2>短消息箱</h2>
                                        <span style="font-size: 13px; color: #666;">未读：<span id="pm-unread-count">0</span></span>
                                    </div>

                                    <div class="pm-alert" id="pm-alert"></div>

                                    <div class="pm-toolbar">
                                        <div class="pm-tabs">
                                            <button type="button" class="pm-tab active" id="pm-tab-all" data-filter="all">全部消息</button>
                                            <button type="button" class="pm-tab" id="pm-tab-system" data-filter="system">系统公告</button>
                                            <button type="button" class="pm-tab" id="pm-tab-reply" data-filter="reply">帖子回复</button>
                                            <button type="button" class="pm-tab" id="pm-tab-quote" data-filter="quote">楼层引用</button>
                                            <button type="button" class="pm-tab" id="pm-tab-private" data-filter="private">私人短消息</button>
                                            <button type="button" class="pm-tab" id="pm-tab-unread" data-filter="unread">未读</button>
                                        </div>
                                        <div style="display:flex; gap:8px; align-items:center;">
                                            <button type="button" class="pm-btn primary" id="pm-compose-private-btn">写短消息</button>
                                            <button type="button" class="pm-btn" id="pm-compose-public-btn" style="display:none;">管理员群发</button>
                                        </div>
                                    </div>

                                    <div class="pm-layout">
                                        <div class="pm-list">
                                            <div class="pm-panel-head">
                                                <span id="pm-list-title">我的短消息</span>
                                                <span class="pm-hint" id="pm-list-meta"></span>
                                            </div>
                                            <div class="pm-panel-body" id="pm-list-body">
                                                <div class="pm-empty">加载中...</div>
                                            </div>
                                        </div>

                                        <div class="pm-detail">
                                            <div class="pm-panel-head">
                                                <span class="pm-detail-title" id="pm-detail-title">短消息内容</span>
                                                <span class="pm-hint" id="pm-detail-meta"></span>
                                            </div>
                                            <div class="pm-panel-body" id="pm-detail-body">
                                                <div class="pm-empty">请选择一条短消息查看内容。</div>
                                            </div>
                                        </div>
                                    </div>

                                    <a href="index.html" class="back-btn">&lt; 返回首页</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-container">
                    <span>我的红蜻蜓</span>
                    <span class="status-right" style="position: relative; cursor: pointer;" onclick="window.location.href='message.html'">消息中心<span class="unread-badge" style="display:none;">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260507-8"></script>
</body>
</html>
