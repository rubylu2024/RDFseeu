    <script src="script.js?v=20260509-1"></script>
    <script>
        const PROFILE_TRUST_TITLES = ['新手上路', '初级会员', '中级会员', '高级会员', '资深会员', '精英会员'];
        const PROFILE_USER_TITLES = ['初来乍到', '渐入佳境', '登堂入室', '炉火纯青', '出神入化', '名动一方'];
        let currentProfileContext = null;
        let pendingProfileMessage = null;
        const activityState = {
            page: 1,
            pageSize: 5,
            discussions: [],
            isOwnerView: true
        };

        document.addEventListener('DOMContentLoaded', initProfilePage);
        window.addEventListener('flarum-auth-changed', initProfilePage);

        async function initProfilePage() {
            const loadingOverlay = document.getElementById('loading-overlay');
            const profileContent = document.getElementById('profile-content');
            const errorContent = document.getElementById('error-content');
            const token = typeof getFlarumToken === 'function' ? getFlarumToken() : localStorage.getItem('flarumToken');
            const viewerUserId = localStorage.getItem('flarumUserId');
            const viewerLoggedIn = Boolean(token && viewerUserId);
            const params = new URLSearchParams(window.location.search);
            const paramUserId = String(params.get('id') || '').trim();
            const targetUserId = paramUserId || (viewerUserId ? String(viewerUserId) : '');
            const isOwner = viewerLoggedIn && targetUserId && String(viewerUserId) === String(targetUserId);

            currentProfileContext = null;
            loadingOverlay.style.display = 'flex';
            profileContent.style.display = 'none';
            errorContent.style.display = 'none';
            errorContent.innerHTML = '';
            clearToasts();

            if (typeof isFlarumConfigured === 'function' && !isFlarumConfigured()) {
                showProfileError('论坛后端未配置。', false);
                loadingOverlay.style.display = 'none';
                return;
            }

            try {
                if (!targetUserId) {
                    showProfileError('请先登录后再查看个人资料。', true);
                    loadingOverlay.style.display = 'none';
                    return;
                }

                const userData = await fetchUserData(targetUserId, isOwner);
                if (!userData || !userData.data) {
                    throw new Error('未获取到用户资料');
                }

                const context = buildProfileContext(userData);
                currentProfileContext = context;
                activityState.isOwnerView = isOwner;

                const isViewerAdmin = viewerLoggedIn ? await isCurrentUserAdmin().catch(() => false) : false;
                applyProfileMode({ isOwner, viewerLoggedIn, isViewerAdmin, targetUserId: context.userId });

                const [stats, discussions] = await Promise.all([
                    fetchUserStats(context.userId, context.username, false),
                    fetchUserDiscussions(context.userId, context.username, false)
                ]);
                activityState.discussions = Array.isArray(discussions) ? discussions : [];
                activityState.page = 1;

                renderUserProfile(context, { isOwner, viewerLoggedIn });
                if (isOwner) {
                    renderProfileEditor(context);
                }
                renderUserStats(stats);
                renderActivitySection();
                bindProfileActions({ isOwner });

                profileContent.style.display = 'block';
                if (pendingProfileMessage) {
                    showPageMessage(pendingProfileMessage.message, pendingProfileMessage.type);
                    pendingProfileMessage = null;
                }
            } catch (error) {
                console.error('加载个人资料失败:', error);
                const friendlyMessage = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'profile')
                    : '个人资料暂时无法加载，请稍后再试。';
                const showLoginLink = Boolean(error?.httpStatus === 401 || error?.apiError?.status === 401);
                showProfileError(friendlyMessage, showLoginLink);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function buildProfileContext(userData) {
            const user = userData.data;
            const included = userData.included || [];
            const attributes = user?.attributes || {};
            const username = attributes.username || '未设置';
            const displayName = typeof getPreferredDisplayName === 'function'
                ? getPreferredDisplayName(attributes, username)
                : (attributes.nickname || attributes.displayName || username);
            const rawNickname = typeof attributes.nickname === 'string' ? attributes.nickname : '';
            const signature = typeof attributes.bio === 'string'
                ? attributes.bio
                : (typeof attributes.signature === 'string' ? attributes.signature : '');
            const points = getProfilePoints(attributes);
            const trustLevel = Number(attributes.trustLevel || 0);
            const email = attributes.email || '-';
            const isActivated = attributes.isEmailConfirmed !== false;
            const title = attributes.title || PROFILE_USER_TITLES[trustLevel] || '新手上路';
            const avatarUrl = attributes.avatarUrl || '';
            const groupRefs = user?.relationships?.groups?.data || [];
            const groupNames = [];
            let badgeHTML = '';

            groupRefs.forEach((groupRef) => {
                const group = included.find((item) => item.type === 'groups' && item.id === groupRef.id);
                const groupName = group?.attributes?.name || group?.attributes?.singularName;
                if (groupName) {
                    groupNames.push(groupName);
                }
                if (String(groupRef.id) === '1') {
                    badgeHTML = '<span class="group-badge admin">管理员</span>';
                } else if (String(groupRef.id) === '2' && !badgeHTML) {
                    badgeHTML = '<span class="group-badge mod">版主</span>';
                }
            });

            return {
                userId: String(user?.id || ''),
                username,
                displayName,
                rawNickname,
                email,
                signature,
                points,
                trustLevel,
                trustTitle: PROFILE_TRUST_TITLES[trustLevel] || '新手上路',
                title,
                avatarUrl,
                joinedAt: attributes.joinedAt || attributes.joinTime || attributes.createdAt || attributes.registeredAt || '',
                lastActiveAt: attributes.lastSeenAt || attributes.lastActivityAt || '',
                groupNames: groupNames.length ? groupNames : ['普通会员'],
                badgeHTML,
                isActivated
            };
        }

        function renderUserProfile(context) {
        }

        function applyProfileMode({ isOwner, viewerLoggedIn, isViewerAdmin, targetUserId }) {
            const pmLink = document.getElementById('profile-pm-link');
            const adminBroadcastLink = document.getElementById('profile-admin-broadcast-link');
            const breadcrumb = document.querySelector('.profile-breadcrumb span');
            const activityTitle = document.getElementById('profile-activity-title');
            if (breadcrumb) breadcrumb.textContent = isOwner ? '个人资料' : '用户资料';
            if (activityTitle) activityTitle.textContent = isOwner ? '我的主题' : 'TA的主题';

            if (pmLink) {
                if (isOwner) {
                    pmLink.textContent = '写短消息';
                    pmLink.setAttribute('href', 'message.html');
                } else {
                    pmLink.textContent = '给TA发短消息';
                    const href = typeof buildMessageHrefForUserId === 'function'
                        ? buildMessageHrefForUserId(targetUserId)
                        : `message.html?to=${encodeURIComponent(String(targetUserId || ''))}`;
                    pmLink.setAttribute('href', href);
                }
            }

            if (adminBroadcastLink) {
                adminBroadcastLink.style.display = isViewerAdmin ? '' : 'none';
            }

            const avatarTrigger = document.getElementById('avatar-trigger');
            const avatarInput = document.getElementById('avatar-upload-input');
            const avatarOverlay = document.querySelector('.avatar-upload-overlay');
            const activityPanel = document.getElementById('profile-activity-panel');
            if (!isOwner) {
                if (activityPanel) activityPanel.style.display = '';
                if (avatarInput) {
                    avatarInput.value = '';
                    avatarInput.style.display = 'none';
                    avatarInput.disabled = true;
                }
                if (avatarOverlay) avatarOverlay.style.display = 'none';
                if (avatarTrigger) {
                    avatarTrigger.removeAttribute('role');
                    avatarTrigger.removeAttribute('tabindex');
                    avatarTrigger.removeAttribute('aria-label');
                    avatarTrigger.style.cursor = 'default';
                }

                const nicknameForm = document.getElementById('profile-nickname-form');
                const signatureForm = document.getElementById('profile-signature-form');
                const passwordBtn = document.getElementById('open-password-modal-btn');
                const passwordModal = document.getElementById('password-modal');
                const nicknamePanel = nicknameForm ? nicknameForm.closest('.profile-panel') : null;
                const signaturePanel = signatureForm ? signatureForm.closest('.profile-panel') : null;
                if (nicknamePanel) nicknamePanel.style.display = 'none';
                if (signaturePanel) signaturePanel.style.display = 'none';
                const securityPanel = passwordBtn ? passwordBtn.closest('.profile-panel') : null;
                if (securityPanel) securityPanel.style.display = 'none';
                if (passwordModal) passwordModal.style.display = 'none';
            } else {
                if (activityPanel) activityPanel.style.display = '';
                if (avatarInput) {
                    avatarInput.style.display = '';
                    avatarInput.disabled = false;
                }
                if (avatarOverlay) avatarOverlay.style.display = '';
                if (avatarTrigger) {
                    avatarTrigger.setAttribute('role', 'button');
                    avatarTrigger.setAttribute('tabindex', '0');
                    avatarTrigger.setAttribute('aria-label', '上传头像');
                    avatarTrigger.style.cursor = '';
                }

                const nicknameForm = document.getElementById('profile-nickname-form');
                const signatureForm = document.getElementById('profile-signature-form');
                const passwordBtn = document.getElementById('open-password-modal-btn');
                const passwordModal = document.getElementById('password-modal');
                const nicknamePanel = nicknameForm ? nicknameForm.closest('.profile-panel') : null;
                const signaturePanel = signatureForm ? signatureForm.closest('.profile-panel') : null;
                if (nicknamePanel) nicknamePanel.style.display = '';
                if (signaturePanel) signaturePanel.style.display = '';
                const securityPanel = passwordBtn ? passwordBtn.closest('.profile-panel') : null;
                if (securityPanel) securityPanel.style.display = '';
                if (passwordModal) passwordModal.style.display = '';
            }

            const viewerTag = document.getElementById('profile-status-tags');
            const statusLoginEl = document.getElementById('status-login');
            if (statusLoginEl) statusLoginEl.textContent = viewerLoggedIn ? '已登录' : '未登录';
            if (!viewerLoggedIn && viewerTag) {
                const tags = Array.from(viewerTag.querySelectorAll('.status-tag'));
                if (tags[0]) tags[0].textContent = '当前未登录';
                if (tags[0]) tags[0].className = 'status-tag warn';
            }
        }

        function renderUserProfile(context, options) {
            const isOwner = options && options.isOwner === true;
            const viewerLoggedIn = options && options.viewerLoggedIn === true;
            if (isOwner) {
                localStorage.setItem('flarumUsername', context.displayName);
            }
            document.getElementById('user-name').textContent = context.displayName;
            document.getElementById('user-group-badge').innerHTML = context.badgeHTML;
            document.getElementById('user-title').textContent = context.title;
            document.getElementById('meta-username').textContent = context.username;
            document.getElementById('meta-user-id').textContent = context.userId || '-';
            document.getElementById('meta-joined').textContent = formatProfileDate(context.joinedAt);
            document.getElementById('info-last-active').textContent = formatProfileDate(context.lastActiveAt);
            document.getElementById('status-login').textContent = viewerLoggedIn ? '已登录' : '未登录';
            document.getElementById('status-activation').textContent = context.isActivated ? '已激活' : '待激活';
            document.getElementById('status-title').textContent = context.title;

            const tags = [
                `<span class="status-tag ${viewerLoggedIn ? 'ok' : 'warn'}">${viewerLoggedIn ? '当前已登录' : '当前未登录'}</span>`,
                `<span class="status-tag ${context.isActivated ? 'ok' : 'warn'}">${context.isActivated ? '账号已激活' : '账号待激活'}</span>`,
                `<span class="status-tag">${escapeHtml(context.groupNames.join('，'))}</span>`,
                `<span class="status-tag">${escapeHtml(context.trustTitle)}</span>`
            ];
            document.getElementById('profile-status-tags').innerHTML = tags.join('');

            const signatureEl = document.getElementById('user-signature');
            signatureEl.textContent = context.signature && context.signature.trim()
                ? context.signature.trim()
                : '这个用户很懒，还没有留下个性签名。';

            const avatarEl = document.getElementById('user-avatar');
            if (context.avatarUrl) {
                avatarEl.className = '';
                avatarEl.innerHTML = `<img src="${context.avatarUrl}" alt="头像">`;
            } else {

        function getProfilePoints(attributes) {
            // 私信积分回滚由服务器 SQL 处理，不在前端扣减。
            const candidates = [
                attributes?.points,
                attributes?.money,
                attributes?.moneyAmount,
                attributes?.money_balance,
                attributes?.balance
            ];
            for (const value of candidates) {
                if (typeof value === 'number' && Number.isFinite(value)) return value;
                if (typeof value === 'string' && value.trim()) {
                    const parsed = Number(value);
                    if (Number.isFinite(parsed)) return parsed;
                }
            }
            return 0;
        }

        function renderActivitySection() {
            const list = document.getElementById('activity-list');
            const pageInfo = document.getElementById('activity-page-info');
            const prevBtn = document.getElementById('activity-prev-btn');
            const nextBtn = document.getElementById('activity-next-btn');
            const source = activityState.discussions;
            const totalItems = source.length;
            const totalPages = Math.max(1, Math.ceil(totalItems / activityState.pageSize));

            if (activityState.page > totalPages) {
                activityState.page = totalPages;
            }

            const startIndex = (activityState.page - 1) * activityState.pageSize;
            const items = source.slice(startIndex, startIndex + activityState.pageSize);

            if (items.length === 0) {
                list.innerHTML = activityState.isOwnerView
                    ? '<li class="empty-state">你还没有发布过主题，去首页试试发第一帖吧。</li>'
                    : '<li class="empty-state">TA还没有发布过主题。</li>';
            } else {
                list.innerHTML = items.map((post) => {
                    const title = post?.attributes?.title || '无标题';
                    const createdAt = formatProfileDate(post?.attributes?.createdAt);
                    const commentCount = typeof post?.attributes?.commentCount === 'number' ? post.attributes.commentCount : 0;
                    const viewCount = typeof getDiscussionViewCount === 'function'
                        ? getDiscussionViewCount(post?.attributes)
                        : 0;
                    const viewCountText = String(viewCount);
                    return `
                        <li class="content-item">
                            <a href="post.html?id=${encodeURIComponent(post.id)}" class="content-title">${escapeHtml(title)}</a>
                            <div class="content-meta">
                                <span>发布时间：${createdAt}</span>
                                <span>回复：${commentCount}</span>
                                <span>浏览：${viewCountText}</span>
                            </div>
                        </li>
                    `;
                }).join('');
            }

            pageInfo.textContent = totalItems
                ? `第 ${activityState.page} / ${totalPages} 页，共 ${totalItems} 条`
                : '暂无内容';
            prevBtn.disabled = activityState.page <= 1;
            nextBtn.disabled = activityState.page >= totalPages || totalItems === 0;
        }

        function bindProfileActions(options) {
            const isOwner = options && options.isOwner === true;
            const logoutBtn = document.getElementById('logout-btn');
            const avatarTrigger = document.getElementById('avatar-trigger');
            const avatarInput = document.getElementById('avatar-upload-input');
            const nicknameForm = document.getElementById('profile-nickname-form');
            const signatureForm = document.getElementById('profile-signature-form');
            const passwordForm = document.getElementById('password-form');
            const resetPasswordBtn = document.getElementById('reset-password-btn');
            const openPasswordModalBtn = document.getElementById('open-password-modal-btn');
            const closePasswordModalBtn = document.getElementById('close-password-modal-btn');
            const passwordModal = document.getElementById('password-modal');
            const activityPrevBtn = document.getElementById('activity-prev-btn');
            const activityNextBtn = document.getElementById('activity-next-btn');

            if (logoutBtn) {
                logoutBtn.onclick = function() {
                    if (typeof clearFlarumToken === 'function') {
                        clearFlarumToken();
                    } else {
                        localStorage.removeItem('flarumToken');
                        localStorage.removeItem('flarumUserId');
                        localStorage.removeItem('flarumUsername');
                    }
                    window.location.href = '/';
                };
            }

            if (isOwner) {
                if (avatarTrigger && avatarInput) {
                    avatarTrigger.onclick = function() {
                        avatarInput.click();
                    };

                    avatarTrigger.onkeydown = function(event) {
                        if (event.key === 'Enter' || event.key === ' ') {
                            event.preventDefault();
                            avatarInput.click();
                        }
                    };
                }

                if (avatarInput) {
                    avatarInput.onchange = function() {
                        handleAvatarUpload(this);
                    };
                }

                if (nicknameForm) nicknameForm.onsubmit = handleNicknameSave;
                if (signatureForm) signatureForm.onsubmit = handleSignatureSave;
                if (passwordForm) passwordForm.onsubmit = handlePasswordSave;

                if (resetPasswordBtn) resetPasswordBtn.onclick = resetPasswordForm;
                if (openPasswordModalBtn) openPasswordModalBtn.onclick = openPasswordModal;
                if (closePasswordModalBtn) closePasswordModalBtn.onclick = closePasswordModal;

                if (passwordModal) {
                    passwordModal.onclick = function(event) {
                        if (event.target === passwordModal) {
                            closePasswordModal();
                        }
                    };
                }
            }

            activityPrevBtn.onclick = function() {
                if (activityState.page > 1) {
                    activityState.page -= 1;
                    renderActivitySection();

            };

            activityNextBtn.onclick = function() {
                activityState.page += 1;
                renderActivitySection();
            };
        }

        async function fetchUserData(userId, auth) {
            return await flarumRequest(`/users/${userId}?include=groups`, { auth: !!auth });
        }

        async function fetchUserStats(userId, username, auth) {
            const stats = { posts: 0, comments: 0 };

            try {
                const safeUserId = String(userId || '');
                const safeUsername = String(username || '');
                const publicDiscussionQuery = typeof buildPublicDiscussionFilterQuery === 'function'
                    ? buildPublicDiscussionFilterQuery()
                    : '-is:private';

                const pickStarterId = (discussion) => {
                    const id = discussion?.relationships?.user?.data?.id;
                    return id == null ? '' : String(id);
                };

                const loadStarterDiscussions = async ({ starterUserId, limit, pageLimit, pageGuardLimit }) => {
                    const starterId = starterUserId == null ? '' : String(starterUserId);
                    if (!starterId) return [];
                    const safeLimit = typeof limit === 'number' && Number.isFinite(limit) && limit > 0 ? Math.floor(limit) : 30;
                    const safePageLimit = typeof pageLimit === 'number' && Number.isFinite(pageLimit) && pageLimit > 0 ? Math.min(50, Math.floor(pageLimit)) : 50;
                    const safeGuard = typeof pageGuardLimit === 'number' && Number.isFinite(pageGuardLimit) && pageGuardLimit > 0 ? Math.floor(pageGuardLimit) : 8;

                    const collected = [];
                    let offset = 0;
                    let guard = 0;
                    while (collected.length < safeLimit && guard < safeGuard) {
                        guard += 1;
                        const pageJson = await flarumRequest(
                            `/discussions?sort=-createdAt&filter[q]=${encodeURIComponent(publicDiscussionQuery)}&page[limit]=${safePageLimit}&page[offset]=${offset}&include=user`,
                            { auth: !!auth }
                        );
                        const pageDiscussionsRaw = Array.isArray(pageJson?.data) ? pageJson.data : [];
                        const pageDiscussions = typeof filterPublicDiscussions === 'function'
                            ? filterPublicDiscussions(pageDiscussionsRaw)
                            : pageDiscussionsRaw;

                        pageDiscussions.forEach((d) => {
                            if (collected.length >= safeLimit) return;
                            if (pickStarterId(d) !== starterId) return;
                            collected.push(d);
                        });

                        const nextOffset = typeof parseOffsetFromPageLink === 'function'
                            ? parseOffsetFromPageLink(pageJson?.links?.next)
                            : null;
                        if (nextOffset == null || pageDiscussionsRaw.length === 0) break;
                        offset = nextOffset;
                    }
                    return collected;
                };

                const starterDiscussions = await loadStarterDiscussions({ starterUserId: safeUserId, limit: 200, pageLimit: 50, pageGuardLimit: 8 });
                stats.posts = starterDiscussions.length;

                const firstPostsPage = await flarumRequest(
                    `/posts?sort=-createdAt&filter[user]=${encodeURIComponent(safeUserId)}&page[limit]=50&page[offset]=0&include=discussion,user`,
                    { auth: !!auth }
                );
                const firstPagePosts = Array.isArray(firstPostsPage?.data) ? firstPostsPage.data : [];
                const firstPageIncluded = Array.isArray(firstPostsPage?.included) ? firstPostsPage.included : [];
                const collected = firstPagePosts.filter((post) => {
                    if (String(post?.relationships?.user?.data?.id || '') !== safeUserId) return false;
                    if (typeof isPrivatePostResource === 'function' && isPrivatePostResource(post, firstPageIncluded)) return false;
                    return true;
                });
                let offset = typeof parseOffsetFromPageLink === 'function' ? parseOffsetFromPageLink(firstPostsPage?.links?.next) : null;
                let pageGuard = 0;
                while (offset != null && collected.length < 200 && pageGuard < 6) {
                    pageGuard += 1;
                    const pageJson = await flarumRequest(
                        `/posts?sort=-createdAt&filter[user]=${encodeURIComponent(safeUserId)}&page[limit]=50&page[offset]=${offset}&include=discussion,user`,
                        { auth: !!auth }
                    );
                    const pagePosts = Array.isArray(pageJson?.data) ? pageJson.data : [];
                    const pageIncluded = Array.isArray(pageJson?.included) ? pageJson.included : [];
                    pagePosts.forEach((post) => {
                        if (String(post?.relationships?.user?.data?.id || '') !== safeUserId) return;
                        if (typeof isPrivatePostResource === 'function' && isPrivatePostResource(post, pageIncluded)) return;
                        collected.push(post);
                    });
                    offset = typeof parseOffsetFromPageLink === 'function' ? parseOffsetFromPageLink(pageJson?.links?.next) : null;
                    if (pagePosts.length === 0) break;
                }

                const replyCount = collected
                    .filter((post) => {
                        const floor = Number(post?.attributes?.number);
                        return Number.isFinite(floor) && floor > 1;
                    }).length;

                stats.comments = replyCount;
            } catch (error) {
                console.error('获取用户统计失败:', error);
            }

            return stats;
        }

        async function fetchUserDiscussions(userId, username, auth) {
            try {
                const publicDiscussionQuery = typeof buildPublicDiscussionFilterQuery === 'function'
                    ? buildPublicDiscussionFilterQuery()
                    : '-is:private';

                const safeUserId = String(userId || '').trim();
                if (!safeUserId) return [];

                const pickStarterId = (discussion) => {
                    const id = discussion?.relationships?.user?.data?.id;
                    return id == null ? '' : String(id);
                };

                const collected = [];
                let offset = 0;
                let guard = 0;
                while (collected.length < 30 && guard < 8) {
                    guard += 1;
                    const pageJson = await flarumRequest(
                        `/discussions?sort=-createdAt&filter[q]=${encodeURIComponent(publicDiscussionQuery)}&page[limit]=50&page[offset]=${offset}&include=user`,
                        { auth: !!auth }
                    );
                    const pageDiscussionsRaw = Array.isArray(pageJson?.data) ? pageJson.data : [];
                    const pageDiscussions = typeof filterPublicDiscussions === 'function'
                        ? filterPublicDiscussions(pageDiscussionsRaw)
                        : pageDiscussionsRaw;
                    pageDiscussions.forEach((d) => {
                        if (collected.length >= 30) return;
                        if (pickStarterId(d) !== safeUserId) return;
                        collected.push(d);
                    });

                    const nextOffset = typeof parseOffsetFromPageLink === 'function'
                        ? parseOffsetFromPageLink(pageJson?.links?.next)
                        : null;
                    if (nextOffset == null || pageDiscussionsRaw.length === 0) break;
                    offset = nextOffset;
                }
                return collected;
            } catch (error) {
                console.error('获取用户帖子失败:', error);
                return [];
            }
        }

        async function handleNicknameSave(event) {
            event.preventDefault();

            if (!currentProfileContext) return;

            const nicknameInput = document.getElementById('editor-nickname');
            const saveBtn = document.getElementById('save-nickname-btn');
            const userId = localStorage.getItem('flarumUserId');
            const normalizedNickname = nicknameInput.value.trim();
            const effectiveNickname = normalizedNickname || currentProfileContext.rawNickname || currentProfileContext.displayName || currentProfileContext.username;

            if (effectiveNickname.length > 30) {
                showPageMessage('昵称最多可填写 30 个字符。', 'error');
                nicknameInput.focus();
                return;
            }

            const previousEffectiveNickname = currentProfileContext.rawNickname || currentProfileContext.displayName || currentProfileContext.username;
            const nicknameChanged = effectiveNickname !== previousEffectiveNickname;
            if (!nicknameChanged) return showPageMessage('昵称没有变化，无需重复保存。', 'success');

            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            try {
                await updateUserAttributes(userId, { nickname: effectiveNickname });

                const refreshedUserData = await fetchUserData(userId);
                const refreshedContext = buildProfileContext(refreshedUserData);
                const refreshedEffectiveNickname = refreshedContext.rawNickname || refreshedContext.displayName || refreshedContext.username;
                const nicknameApplied = refreshedEffectiveNickname === effectiveNickname;
                if (!nicknameApplied) throw new Error('昵称未实际保存成功');

                localStorage.setItem('flarumUsername', refreshedContext.displayName);
                window.dispatchEvent(new Event('flarum-auth-changed'));

                pendingProfileMessage = { message: '昵称已保存。', type: 'success' };
                await initProfilePage();
            } catch (error) {
                console.error('保存个人资料失败:', error);
                let message = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'profile')
                    : '昵称保存失败，请稍后再试。';
                if (/昵称未实际保存成功/.test(String(error?.message || ''))) message = '昵称提交成功了，但后端没有实际保存这次修改，请稍后重试或联系网管检查昵称字段是否已开启。';

                showPageMessage(message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存昵称';
            }
        }

        async function handleSignatureSave(event) {
            event.preventDefault();

            if (!currentProfileContext) return;

            const signatureInput = document.getElementById('editor-signature');
            const saveBtn = document.getElementById('save-signature-btn');
            const userId = localStorage.getItem('flarumUserId');

            if (normalizedSignature.length > 200) {

        async function handlePasswordSave(event) {
            event.preventDefault();

            const currentPasswordInput = document.getElementById('current-password');
            const newPasswordInput = document.getElementById('new-password');
            const confirmInput = document.getElementById('confirm-new-password');
            const savePasswordBtn = document.getElementById('save-password-btn');
            const userId = localStorage.getItem('flarumUserId');
            const currentPassword = currentPasswordInput.value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmInput.value;

            if (!currentPassword) {
                showPageMessage('请输入当前密码后再修改。', 'error');
                currentPasswordInput.focus();
                return;
            }

            if (!newPassword || newPassword.length < 8) {
                showPageMessage('新密码长度至少需要 8 位。', 'error');
                newPasswordInput.focus();
                return;
            }

            if (!/[a-zA-Z]/.test(newPassword)) {
                showPageMessage('新密码建议至少包含一个字母。', 'error');
                newPasswordInput.focus();
                return;
            }

            if (newPassword !== confirmPassword) {
                showPageMessage('两次输入的新密码不一致。', 'error');
                confirmInput.focus();
                return;
            }

            if (newPassword === currentPassword) {
                showPageMessage('新密码不能与当前密码完全相同。', 'error');
                newPasswordInput.focus();
                return;
            }

            savePasswordBtn.disabled = true;
            savePasswordBtn.textContent = '提交中...';

            try {
                await updateUserAttributes(userId, {
                    password: newPassword,
                    currentPassword
                });
                resetPasswordForm();
                closePasswordModal();
                showPageMessage('密码修改成功。为保障账号安全，已自动退出登录，请重新登录。', 'success');
                localStorage.removeItem('flarumToken');
                localStorage.removeItem('flarumUserId');
                localStorage.removeItem('flarumUsername');
                window.setTimeout(() => {
                    window.location.href = `login.html?redirect=${encodeURIComponent('profile.html')}`;
                }, 1200);
            } catch (error) {
                console.error('修改密码失败:', error);
                let message = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'profile')
                    : '密码修改失败，请稍后再试。';

                const detail = String(error?.apiError?.detail || error?.detail || '');
                if (/password|currentPassword|validation/i.test(detail)) {
                    message = '密码修改失败，请确认当前密码正确，并检查新密码是否符合论坛要求。';
                } else if (error?.httpStatus === 403) {
                    message = '当前账号暂时没有修改密码的权限，请确认账号已激活，如仍有问题请联系网管。';
                }

                showPageMessage(message, 'error');
            } finally {
                savePasswordBtn.disabled = false;
                savePasswordBtn.textContent = '修改密码';
            }
        }

        function ensureToastStack() {
            let stack = document.getElementById('toast-stack');
            if (stack) return stack;
            stack = document.createElement('div');
            stack.id = 'toast-stack';
            stack.className = 'toast-stack';
            document.body.appendChild(stack);
            return stack;
        }

        function clearToasts() {
            const stack = document.getElementById('toast-stack');
            if (stack) stack.innerHTML = '';
        }

        function showToast(message, type) {
            const stack = ensureToastStack();
            const toast = document.createElement('div');
            toast.className = `toast ${type || ''}`.trim();
            toast.setAttribute('role', 'status');
            toast.innerHTML = `
                <div class="toast-message">${escapeHtml(message)}</div>
                <button type="button" class="toast-close" aria-label="关闭">×</button>
            `;
            stack.appendChild(toast);

            const closeBtn = toast.querySelector('.toast-close');
            let closed = false;
            const close = () => {
                if (closed) return;
                closed = true;
                toast.remove();
            };
            closeBtn.onclick = close;
            window.setTimeout(close, 3000);
        }

        function showProfileError(message, showLoginLink) {
            const errorContent = document.getElementById('error-content');
            errorContent.innerHTML = `<p>${escapeHtml(message)}</p>${showLoginLink ? '<p><a href="login.html">点击登录</a></p>' : ''}`;
            errorContent.style.display = 'block';
        }

        function formatProfileDate(value) {
            if (!value) return '暂无记录';
            let raw = value;
            if (typeof raw === 'string' && /^\d+$/.test(raw.trim())) {
                const asNum = Number(raw.trim());
                if (Number.isFinite(asNum)) raw = asNum;
            }
            if (typeof raw === 'number' && Number.isFinite(raw) && raw < 100000000000) {
                raw = raw * 1000;
            }
            const date = new Date(raw);
            if (Number.isNaN(date.getTime())) return '暂无记录';
            const pad = (n) => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function buildPreviewText(rawHtml) {
            const text = String(rawHtml || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
            if (!text) return '';
            return text.length > 70 ? `${text.slice(0, 70)}...` : text;
        }

        function resetPasswordForm() {
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-new-password').value = '';
        }

        function openPasswordModal() {
            const modal = document.getElementById('password-modal');
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            setTimeout(() => {
                const currentPasswordInput = document.getElementById('current-password');
                if (currentPasswordInput) currentPasswordInput.focus();
            }, 0);
        }

        function closePasswordModal() {
            const modal = document.getElementById('password-modal');
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            resetPasswordForm();
        }

        function maskEmail(email) {
            const raw = String(email || '').trim();
            if (!raw || raw === '-') return '-';
            const parts = raw.split('@');
            if (parts.length !== 2) return raw;
            const name = parts[0];
            if (name.length <= 2) {
                return `${name[0] || '*'}***@${parts[1]}`;
            }
            return `${name.slice(0, 2)}***@${parts[1]}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function handleAvatarUpload(input) {
            const file = input.files && input.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showPageMessage('请选择图片文件后再上传头像。', 'error');
                input.value = '';
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                showPageMessage('头像图片大小不能超过 2MB。', 'error');
                input.value = '';
                return;
            }

            const userId = localStorage.getItem('flarumUserId');
            const token = typeof getFlarumToken === 'function' ? getFlarumToken() : localStorage.getItem('flarumToken');
            const avatarContainer = document.getElementById('avatar-trigger');

            try {
                avatarContainer.style.opacity = '0.6';
                avatarContainer.style.cursor = 'wait';

                const formData = new FormData();
                formData.append('avatar', file);

                const response = await fetch(`/api/users/${userId}/avatar`, {
                    method: 'POST',
                    headers: {
                        Authorization: `Token ${token}; userId=${userId}`
                    },
                    body: formData
                });

                if (!response.ok) {
                    let detail = '';
                    try {
                        const errorJson = await response.json();
                        detail = JSON.stringify(errorJson);
                    } catch {
                        detail = await response.text();
                    }
                    const error = new Error('头像上传失败');
                    error.detail = detail;
                    error.httpStatus = response.status;
                    throw error;
                }

                pendingProfileMessage = { message: '头像上传成功，资料页已刷新。', type: 'success' };
                await initProfilePage();
            } catch (error) {
                console.error('上传头像失败:', error);
                const friendlyMessage = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'upload_avatar')
                    : '头像上传失败，请稍后再试。';
                showPageMessage(friendlyMessage, 'error');
            } finally {
                avatarContainer.style.opacity = '1';
                avatarContainer.style.cursor = 'pointer';
                input.value = '';
            }
        }
    </script>
</body>
</html>
