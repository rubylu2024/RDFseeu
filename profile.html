<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - 红蜻蜓论坛</title>
    <link rel="stylesheet" href="styles.css?v=20260506-2">
    <style>
        .page-shell {
            width: 100%;
        }

        .profile-container {
            max-width: 980px;
            margin: 20px auto;
            padding: 20px;
        }

        .profile-header {
            background: linear-gradient(to bottom, #dd5a60 0%, #e4acaf 100%);
            padding: 30px;
            border: 1px solid #000;
            margin-bottom: 20px;
            text-align: center;
        }

        .group-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            margin-left: 8px;
        }

        .group-badge.admin {
            background-color: #cc0000;
        }

        .group-badge.mod {
            background-color: #0066cc;
        }

        .avatar-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background-color: #fff;
            border: 4px solid #990000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            cursor: pointer;
        }

        .avatar-container:hover .avatar-upload-overlay {
            opacity: 1;
        }

        .avatar-upload-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            color: #fff;
        }

        #avatar-upload-input {
            display: none;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            background: url('images/用户头像.png') no-repeat center;
            background-size: contain;
        }

        .profile-header h2 {
            font-size: 28px;
            color: #000;
            margin-bottom: 8px;
        }

        .profile-header p {
            font-size: 15px;
            color: #333;
            margin-bottom: 12px;
        }

        .profile-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            flex: 1;
            background-color: #fff;
            border: 1px solid #000;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #cc0000;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .profile-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background-color: #fff;
            border: 1px solid #000;
            padding: 20px;
        }

        .panel h3 {
            font-size: 18px;
            font-weight: bold;
            color: #cc0000;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #ccc;
            position: relative;
            padding-left: 18px;
        }

        .panel h3::before {
            content: '*';
            position: absolute;
            left: 0;
            color: #cc0000;
            font-size: 14px;
        }

        .info-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px 12px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }

        .info-label {
            width: 120px;
            font-weight: bold;
            color: #555;
            flex-shrink: 0;
            font-size: 14px;
        }

        .info-value {
            color: #333;
            flex: 1;
            font-size: 14px;
            word-break: break-word;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-item {
            padding: 12px;
            border-bottom: 1px dashed #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-title {
            color: #0066cc;
            text-decoration: none;
            font-size: 15px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .post-title:hover {
            text-decoration: underline;
            color: #cc0000;
        }

        .post-meta {
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 30px;
            font-style: italic;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #cc0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background-color: #ffe6e6;
            color: #cc0000;
            padding: 20px;
            margin: 20px;
            border: 1px solid #ffcccc;
            text-align: center;
            border-radius: 4px;
        }

        .btn-logout {
            background-color: #cc0000;
            color: #fff;
            border: 1px solid #990000;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
        }

        .signature {
            background-color: #fff3e6;
            border-left: 3px solid #ff9966;
            padding: 12px;
            margin: 15px auto 0;
            font-style: italic;
            color: #666;
            font-size: 14px;
            max-width: 520px;
        }

        @media (max-width: 720px) {
            .profile-section {
                grid-template-columns: 1fr;
            }

            .profile-stats {
                flex-direction: column;
            }

            .post-item,
            .info-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .info-label {
                width: auto;
            }
        }
    </style>
</head>

    <script src="script.js?v=20260507-1"></script>
    <script>
        const PROFILE_TRUST_TITLES = ['新手上路', '初级会员', '中级会员', '高级会员', '资深会员', '精英会员'];
        const PROFILE_USER_TITLES = ['初来乍到', '渐入佳境', '登堂入室', '炉火纯青', '出神入化', '名动一方'];

        document.addEventListener('DOMContentLoaded', initProfilePage);
        window.addEventListener('flarum-auth-changed', initProfilePage);

        async function initProfilePage() {
            const loadingOverlay = document.getElementById('loading-overlay');
            const profileContent = document.getElementById('profile-content');
            const errorContent = document.getElementById('error-content');
            const token = typeof getFlarumToken === 'function' ? getFlarumToken() : localStorage.getItem('flarumToken');
            const userId = localStorage.getItem('flarumUserId');

            loadingOverlay.style.display = 'flex';
            profileContent.style.display = 'none';
            errorContent.style.display = 'none';
            errorContent.innerHTML = '';

            if (!token || !userId) {
                showProfileError('请先登录后再查看个人资料。', true);
                loadingOverlay.style.display = 'none';
                return;
            }

            try {
                const [userData, stats, discussions, comments] = await Promise.all([
                    fetchUserData(userId),
                    fetchUserStats(userId),
                    fetchUserDiscussions(userId),
                    fetchUserComments(userId)
                ]);

                if (!userData || !userData.data) {
                    throw new Error('未获取到用户资料');
                }

                renderUserProfile(userData);
                renderUserStats(stats);
                renderRecentPosts(discussions);
                renderRecentComments(comments);
                bindProfileActions();

                profileContent.style.display = 'block';
            } catch (error) {
                console.error('加载个人资料失败:', error);
                showProfileError(`加载个人资料失败：${error.message || '未知错误'}`, true);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function showProfileError(message, showLoginLink) {
            const errorContent = document.getElementById('error-content');
            errorContent.innerHTML = `<p>${message}</p>${showLoginLink ? '<a href="login.html">点击登录</a>' : ''}`;
            errorContent.style.display = 'block';
        }

        function bindProfileActions() {
            const logoutBtn = document.getElementById('logout-btn');
            const avatarInput = document.getElementById('avatar-upload-input');

            logoutBtn.onclick = function() {
                if (typeof clearFlarumToken === 'function') {
                    clearFlarumToken();
                } else {
                    localStorage.removeItem('flarumToken');
                    localStorage.removeItem('flarumUserId');
                    localStorage.removeItem('flarumUsername');
                }
                window.location.href = 'index.html';
            };

            avatarInput.onchange = function() {
                handleAvatarUpload(this);
            };
        }

        async function fetchUserData(userId) {
            return await flarumRequest(`/users/${userId}?include=groups`, { auth: true });
        }

        async function fetchUserStats(userId) {
            const stats = { posts: 0, comments: 0, likes: 0, reputation: 0 };

            try {
                const [discussionsData, postsData, userData] = await Promise.all([
                    flarumRequest(`/discussions?filter[author]=${userId}&page[limit]=50`, { auth: true }),
                    flarumRequest(`/posts?filter[author]=${userId}&page[limit]=50`, { auth: true }),
                    flarumRequest(`/users/${userId}`, { auth: true })
                ]);

                stats.posts = discussionsData?.data?.length || 0;
                const totalPosts = postsData?.data?.length || 0;
                stats.comments = Math.max(0, totalPosts - stats.posts);
                stats.reputation = userData?.data?.attributes?.reputation || 0;
                stats.likes = userData?.data?.attributes?.likesCount || 0;
            } catch (error) {
                console.error('获取用户统计失败:', error);
            }

            return stats;
        }

        async function fetchUserDiscussions(userId) {
            try {
                const data = await flarumRequest(`/discussions?filter[author]=${userId}&page[limit]=5&include=user`, { auth: true });
                return data?.data || [];
            } catch (error) {
                console.error('获取用户帖子失败:', error);
                return [];
            }
        }

        async function fetchUserComments(userId) {
            try {
                const data = await flarumRequest(`/posts?filter[author]=${userId}&page[limit]=10&include=discussion`, { auth: true });
                const comments = data?.data?.filter((post) => Number(post?.attributes?.number) !== 1) || [];
                return comments.slice(0, 5);
            } catch (error) {
                console.error('获取用户回复失败:', error);
                return [];
            }
        }

        function renderUserProfile(userData) {
            const user = userData.data;
            const included = userData.included || [];
            const username = user?.attributes?.username || '未设置';
            const displayName = user?.attributes?.displayName || username;
            const email = user?.attributes?.email || '-';
            const trustLevel = Number(user?.attributes?.trustLevel || 0);
            const signature = user?.attributes?.signature || '';
            const avatarUrl = user?.attributes?.avatarUrl || '';
            const groupRefs = user?.relationships?.groups?.data || [];
            const groupNames = [];
            let badgeHTML = '';

            groupRefs.forEach((groupRef) => {
                const group = included.find((item) => item.type === 'groups' && item.id === groupRef.id);
                const groupName = group?.attributes?.name || group?.attributes?.singularName;
                if (groupName) {
                    groupNames.push(groupName);
                }
                if (String(groupRef.id) === '1') {
                    badgeHTML = '<span class="group-badge admin">管理员</span>';
                } else if (String(groupRef.id) === '2' && !badgeHTML) {
                    badgeHTML = '<span class="group-badge mod">版主</span>';
                }
            });

            document.getElementById('user-name').textContent = displayName;
            document.getElementById('user-group-badge').innerHTML = badgeHTML;
            document.getElementById('user-title').textContent = user?.attributes?.title || PROFILE_USER_TITLES[trustLevel] || '新手上路';
            document.getElementById('info-username').textContent = username;
            document.getElementById('info-displayname').textContent = displayName;
            document.getElementById('info-email').textContent = email;
            document.getElementById('info-id').textContent = user?.id || '-';
            document.getElementById('info-joined').textContent = formatProfileDate(user?.attributes?.joinedAt);
            document.getElementById('info-last-active').textContent = formatProfileDate(user?.attributes?.lastSeenAt || user?.attributes?.lastActivityAt);
            document.getElementById('info-group').textContent = groupNames.join('，') || '普通会员';
            document.getElementById('info-trust').textContent = PROFILE_TRUST_TITLES[trustLevel] || '新手上路';

            const signatureEl = document.getElementById('user-signature');
            if (signature && signature.trim()) {
                signatureEl.textContent = signature;
                signatureEl.style.display = 'block';
            } else {
                signatureEl.style.display = 'none';
            }

            if (avatarUrl) {
                document.getElementById('user-avatar').innerHTML = `<img src="${avatarUrl}" alt="头像">`;
            } else {
                document.getElementById('user-avatar').innerHTML = '';
                document.getElementById('user-avatar').className = 'avatar-placeholder';
            }
        }

        function renderUserStats(stats) {
            document.getElementById('stat-posts').textContent = stats.posts || 0;
            document.getElementById('stat-comments').textContent = stats.comments || 0;
            document.getElementById('stat-likes').textContent = stats.likes || 0;
            document.getElementById('stat-reputation').textContent = stats.reputation || 0;
        }

        function renderRecentPosts(posts) {
            const list = document.getElementById('recent-posts-list');
            if (!posts || posts.length === 0) {
                list.innerHTML = '<li class="no-data">暂无帖子</li>';
                return;
            }

            list.innerHTML = posts.map((post) => {
                const title = post?.attributes?.title || '无标题';
                const createdAt = formatProfileDate(post?.attributes?.createdAt);
                return `
                    <li class="post-item">
                        <a href="post.html?id=${encodeURIComponent(post.id)}" class="post-title">${escapeHtml(title)}</a>
                        <span class="post-meta">${createdAt}</span>
                    </li>
                `;
            }).join('');
        }

        function renderRecentComments(comments) {
            const list = document.getElementById('recent-comments-list');
            if (!comments || comments.length === 0) {
                list.innerHTML = '<li class="no-data">暂无回复</li>';
                return;
            }

            list.innerHTML = comments.map((comment) => {
                const discussionId = comment?.relationships?.discussion?.data?.id;
                const floor = comment?.attributes?.number || 1;
                const rawContent = comment?.attributes?.contentHtml || comment?.attributes?.content || '';
                const preview = buildPreviewText(rawContent);
                const createdAt = formatProfileDate(comment?.attributes?.createdAt);
                const link = typeof buildPostFloorLink === 'function'
                    ? buildPostFloorLink(discussionId, floor)
                    : `post.html?id=${encodeURIComponent(discussionId)}#post-${floor}`;

                return `
                    <li class="post-item">
                        <a href="${link}" class="post-title" title="${escapeHtml(preview)}">${escapeHtml(preview || '无内容')}</a>
                        <span class="post-meta">${createdAt}</span>
                    </li>
                `;
            }).join('');
        }

        function formatProfileDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            const pad = (n) => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function buildPreviewText(rawHtml) {
            const text = String(rawHtml || '').replace(/<[^>]*>/g, '').trim();
            if (!text) return '';
            return text.length > 30 ? `${text.slice(0, 30)}...` : text;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function handleAvatarUpload(input) {
            const file = input.files && input.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                input.value = '';
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                alert('图片大小不能超过 2MB');
                input.value = '';
                return;
            }

            const userId = localStorage.getItem('flarumUserId');
            const token = typeof getFlarumToken === 'function' ? getFlarumToken() : localStorage.getItem('flarumToken');
            const avatarContainer = document.querySelector('.avatar-container');

            try {
                avatarContainer.style.opacity = '0.5';
                avatarContainer.style.cursor = 'wait';

                const formData = new FormData();
                formData.append('avatar', file);

                const response = await fetch(`/api/users/${userId}/avatar`, {
                    method: 'POST',
                    headers: {
                        Authorization: `Token ${token}; userId=${userId}`
                    },
                    body: formData,
                    credentials: 'include'
                });

                if (!response.ok) {
                    let detail = '';
                    try {
                        const errorJson = await response.json();
                        detail = errorJson?.errors?.[0]?.detail || response.statusText;
                    } catch {
                        detail = response.statusText;
                    }
                    throw new Error(detail || '上传失败');
                }

                const data = await response.json();
                const avatarUrl = data?.data?.attributes?.avatarUrl;
                if (avatarUrl) {
                    document.getElementById('user-avatar').innerHTML = `<img src="${avatarUrl}" alt="头像">`;
                }
                alert('头像上传成功');
            } catch (error) {
                console.error('上传头像失败:', error);
                alert(`上传头像失败：${error.message || '未知错误'}`);
            } finally {
                avatarContainer.style.opacity = '1';
                avatarContainer.style.cursor = 'pointer';
                input.value = '';
            }
        }
    </script>
</body>
</html>
