    <script src="script.js?v=20260507-7"></script>
    <script>
        const PROFILE_TRUST_TITLES = ['鏂版墜涓婅矾', '鍒濈骇浼氬憳', '涓骇浼氬憳', '楂樼骇浼氬憳', '璧勬繁浼氬憳', '绮捐嫳浼氬憳'];
        const PROFILE_USER_TITLES = ['鍒濇潵涔嶅埌', '娓愬叆浣冲', '鐧诲爞鍏ュ', '鐐夌伀绾潚', '鍑虹鍏ュ寲', '鍚嶅姩涓€鏂?];
        let currentProfileContext = null;
        let pendingProfileMessage = null;
        const activityState = {
            activeTab: 'discussions',
            page: 1,
            pageSize: 5,
            discussions: [],
            comments: [],
            commentIncluded: []
        };

        document.addEventListener('DOMContentLoaded', initProfilePage);
        window.addEventListener('flarum-auth-changed', initProfilePage);

        async function initProfilePage() {
            const loadingOverlay = document.getElementById('loading-overlay');
            const profileContent = document.getElementById('profile-content');
            const errorContent = document.getElementById('error-content');
            const pageMessage = document.getElementById('page-message');
            const token = typeof getFlarumToken === 'function' ? getFlarumToken() : localStorage.getItem('flarumToken');
            const userId = localStorage.getItem('flarumUserId');

            currentProfileContext = null;
            loadingOverlay.style.display = 'flex';
            profileContent.style.display = 'none';
            errorContent.style.display = 'none';
            errorContent.innerHTML = '';
            pageMessage.style.display = 'none';
            pageMessage.textContent = '';
            pageMessage.className = 'profile-message';

            if (!token || !userId) {
                showProfileError('璇峰厛鐧诲綍鍚庡啀鏌ョ湅涓汉璧勬枡銆?, true);
                loadingOverlay.style.display = 'none';
                return;
            }

            try {
                const [userData, stats, discussions, comments] = await Promise.all([
                    fetchUserData(userId),
                    fetchUserStats(userId),
                    fetchUserDiscussions(userId),
                    fetchUserComments(userId)
                ]);

                if (!userData || !userData.data) {
                    throw new Error('鏈幏鍙栧埌鐢ㄦ埛璧勬枡');
                }

                const context = buildProfileContext(userData);
                currentProfileContext = context;
                activityState.discussions = Array.isArray(discussions) ? discussions : [];
                activityState.comments = Array.isArray(comments) ? comments : [];
                activityState.commentIncluded = comments.included || [];
                activityState.page = 1;

                renderUserProfile(context);
                renderProfileEditor(context);
                renderUserStats(stats);
                renderActivitySection();
                bindProfileActions();

                profileContent.style.display = 'block';
                if (pendingProfileMessage) {
                    showPageMessage(pendingProfileMessage.message, pendingProfileMessage.type);
                    pendingProfileMessage = null;
                }
            } catch (error) {
                console.error('鍔犺浇涓汉璧勬枡澶辫触:', error);
                const friendlyMessage = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'profile')
                    : '涓汉璧勬枡鏆傛椂鏃犳硶鍔犺浇锛岃绋嶅悗鍐嶈瘯銆?;
                const showLoginLink = Boolean(error?.httpStatus === 401 || error?.apiError?.status === 401);
                showProfileError(friendlyMessage, showLoginLink);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function buildProfileContext(userData) {
            const user = userData.data;
            const included = userData.included || [];
            const attributes = user?.attributes || {};
            const username = attributes.username || '鏈缃?;
            const displayName = typeof getPreferredDisplayName === 'function'
                ? getPreferredDisplayName(attributes, username)
                : (attributes.nickname || attributes.displayName || username);
            const rawNickname = typeof attributes.nickname === 'string' ? attributes.nickname : '';
            const signature = typeof attributes.signature === 'string' ? attributes.signature : '';
            const trustLevel = Number(attributes.trustLevel || 0);
            const email = attributes.email || '-';
            const isActivated = attributes.isEmailConfirmed !== false;
            const title = attributes.title || PROFILE_USER_TITLES[trustLevel] || '鏂版墜涓婅矾';
            const avatarUrl = attributes.avatarUrl || '';
            const groupRefs = user?.relationships?.groups?.data || [];
            const groupNames = [];
            let badgeHTML = '';

            groupRefs.forEach((groupRef) => {
                const group = included.find((item) => item.type === 'groups' && item.id === groupRef.id);
                const groupName = group?.attributes?.name || group?.attributes?.singularName;
                if (groupName) {
                    groupNames.push(groupName);
                }
                if (String(groupRef.id) === '1') {
                    badgeHTML = '<span class="group-badge admin">绠＄悊鍛?/span>';
                } else if (String(groupRef.id) === '2' && !badgeHTML) {
                    badgeHTML = '<span class="group-badge mod">鐗堜富</span>';
                }
            });

            return {
                userId: String(user?.id || ''),
                username,
                displayName,
                rawNickname,
                email,
                signature,
                trustLevel,
                trustTitle: PROFILE_TRUST_TITLES[trustLevel] || '鏂版墜涓婅矾',
                title,
                avatarUrl,
                joinedAt: attributes.joinedAt || '',
                lastActiveAt: attributes.lastSeenAt || attributes.lastActivityAt || '',
                groupNames: groupNames.length ? groupNames : ['鏅€氫細鍛?],
                badgeHTML,
                isActivated
            };
        }

        function renderUserProfile(context) {
            localStorage.setItem('flarumUsername', context.displayName);
            document.getElementById('user-name').textContent = context.displayName;
            document.getElementById('user-group-badge').innerHTML = context.badgeHTML;
            document.getElementById('user-title').textContent = context.title;
            document.getElementById('meta-username').textContent = context.username;
            document.getElementById('meta-user-id').textContent = context.userId || '-';
            document.getElementById('meta-joined').textContent = formatProfileDate(context.joinedAt);
            document.getElementById('info-username').textContent = context.username;
            document.getElementById('info-displayname').textContent = context.displayName;
            document.getElementById('info-email').textContent = context.email;
            document.getElementById('info-group').textContent = context.groupNames.join('锛?);
            document.getElementById('info-trust').textContent = context.trustTitle;
            document.getElementById('info-last-active').textContent = formatProfileDate(context.lastActiveAt);
            document.getElementById('status-login').textContent = '宸茬櫥褰?;
            document.getElementById('status-activation').textContent = context.isActivated ? '宸叉縺娲? : '寰呮縺娲?;
            document.getElementById('status-title').textContent = context.title;

            const tags = [
                '<span class="status-tag ok">褰撳墠宸茬櫥褰?/span>',
                `<span class="status-tag ${context.isActivated ? 'ok' : 'warn'}">${context.isActivated ? '璐﹀彿宸叉縺娲? : '璐﹀彿寰呮縺娲?}</span>`,
                `<span class="status-tag">${escapeHtml(context.groupNames.join('锛?))}</span>`,
                `<span class="status-tag">${escapeHtml(context.trustTitle)}</span>`
            ];
            document.getElementById('profile-status-tags').innerHTML = tags.join('');

            const signatureEl = document.getElementById('user-signature');
            signatureEl.textContent = context.signature && context.signature.trim()
                ? context.signature.trim()
                : '杩欎釜鐢ㄦ埛寰堟噿锛岃繕娌℃湁鐣欎笅涓€х鍚嶃€?;

            const avatarEl = document.getElementById('user-avatar');
            if (context.avatarUrl) {
                avatarEl.className = '';
                avatarEl.innerHTML = `<img src="${context.avatarUrl}" alt="澶村儚">`;
            } else {
                avatarEl.className = 'avatar-placeholder';
                avatarEl.innerHTML = '';
            }
        }

        function renderProfileEditor(context) {
            document.getElementById('editor-username').textContent = context.username;
            document.getElementById('editor-email').textContent = context.email;
            document.getElementById('editor-nickname').value = context.rawNickname;
            document.getElementById('editor-signature').value = context.signature;
            document.getElementById('security-username').textContent = context.username;
            document.getElementById('security-email').textContent = maskEmail(context.email);
        }

        function renderUserStats(stats) {
            document.getElementById('stat-posts').textContent = stats.posts || 0;
            document.getElementById('stat-comments').textContent = stats.comments || 0;
            document.getElementById('stat-likes').textContent = stats.likes || 0;
            document.getElementById('stat-reputation').textContent = stats.reputation || 0;
        }

        function renderActivitySection() {
            const list = document.getElementById('activity-list');
            const pageInfo = document.getElementById('activity-page-info');
            const prevBtn = document.getElementById('activity-prev-btn');
            const nextBtn = document.getElementById('activity-next-btn');
            const tabDiscussions = document.getElementById('tab-discussions');
            const tabComments = document.getElementById('tab-comments');
            const isDiscussionTab = activityState.activeTab === 'discussions';
            const source = isDiscussionTab ? activityState.discussions : activityState.comments;
            const totalItems = source.length;
            const totalPages = Math.max(1, Math.ceil(totalItems / activityState.pageSize));

            if (activityState.page > totalPages) {
                activityState.page = totalPages;
            }

            const startIndex = (activityState.page - 1) * activityState.pageSize;
            const items = source.slice(startIndex, startIndex + activityState.pageSize);

            tabDiscussions.classList.toggle('active', isDiscussionTab);
            tabComments.classList.toggle('active', !isDiscussionTab);

            if (items.length === 0) {
                list.innerHTML = isDiscussionTab
                    ? '<li class="empty-state">浣犺繕娌℃湁鍙戝竷杩囦富棰橈紝鍘婚椤佃瘯璇曞彂绗竴甯栧惂銆?/li>'
                    : '<li class="empty-state">浣犺繕娌℃湁鍙戣〃杩囧洖澶嶏紝鐪嬪埌鎰熷叴瓒ｇ殑甯栧瓙灏卞幓鍙備笌璁ㄨ鍚с€?/li>';
            } else if (isDiscussionTab) {
                list.innerHTML = items.map((post) => {
                    const title = post?.attributes?.title || '鏃犳爣棰?;
                    const createdAt = formatProfileDate(post?.attributes?.createdAt);
                    const commentCount = typeof post?.attributes?.commentCount === 'number' ? post.attributes.commentCount : 0;
                    const viewCount = typeof post?.attributes?.viewCount === 'number' ? post.attributes.viewCount : 0;
                    return `
                        <li class="content-item">
                            <a href="post.html?id=${encodeURIComponent(post.id)}" class="content-title">${escapeHtml(title)}</a>
                            <div class="content-meta">
                                <span>鍙戝竷鏃堕棿锛?{createdAt}</span>
                                <span>鍥炲锛?{commentCount}</span>
                                <span>娴忚锛?{viewCount}</span>
                            </div>
                        </li>
                    `;
                }).join('');
            } else {
                list.innerHTML = items.map((comment) => {
                    const discussionId = comment?.relationships?.discussion?.data?.id;
                    const floor = comment?.attributes?.number || 1;
                    const rawContent = comment?.attributes?.contentHtml || comment?.attributes?.content || '';
                    const preview = buildPreviewText(rawContent) || '鏃犲唴瀹?;
                    const createdAt = formatProfileDate(comment?.attributes?.createdAt);
                    const discussion = Array.isArray(activityState.commentIncluded)
                        ? activityState.commentIncluded.find((item) => item.type === 'discussions' && item.id === discussionId)
                        : null;
                    const discussionTitle = discussion?.attributes?.title || '鎵€灞炲笘瀛?;
                    const link = typeof buildPostFloorLink === 'function'
                        ? buildPostFloorLink(discussionId, floor)
                        : `post.html?id=${encodeURIComponent(discussionId)}#post-${floor}`;

                    return `
                        <li class="content-item">
                            <a href="${link}" class="content-title">鍥炲浜庛€?{escapeHtml(discussionTitle)}銆?/a>
                            <div class="content-preview">${escapeHtml(preview)}</div>
                            <div class="content-meta">
                                <span>妤煎眰锛?{floor} 妤?/span>
                                <span>鍥炲鏃堕棿锛?{createdAt}</span>
                            </div>
                        </li>
                    `;
                }).join('');
            }

            pageInfo.textContent = totalItems
                ? `绗?${activityState.page} / ${totalPages} 椤碉紝鍏?${totalItems} 鏉
                : '鏆傛棤鍐呭';
            prevBtn.disabled = activityState.page <= 1;
            nextBtn.disabled = activityState.page >= totalPages || totalItems === 0;
        }

        function bindProfileActions() {
            const logoutBtn = document.getElementById('logout-btn');
            const avatarTrigger = document.getElementById('avatar-trigger');
            const avatarInput = document.getElementById('avatar-upload-input');
            const profileForm = document.getElementById('profile-form');
            const resetProfileBtn = document.getElementById('reset-profile-btn');
            const passwordForm = document.getElementById('password-form');
            const resetPasswordBtn = document.getElementById('reset-password-btn');
            const openPasswordModalBtn = document.getElementById('open-password-modal-btn');
            const closePasswordModalBtn = document.getElementById('close-password-modal-btn');
            const passwordModal = document.getElementById('password-modal');
            const tabDiscussions = document.getElementById('tab-discussions');
            const tabComments = document.getElementById('tab-comments');
            const activityPrevBtn = document.getElementById('activity-prev-btn');
            const activityNextBtn = document.getElementById('activity-next-btn');

            logoutBtn.onclick = function() {
                if (typeof clearFlarumToken === 'function') {
                    clearFlarumToken();
                } else {
                    localStorage.removeItem('flarumToken');
                    localStorage.removeItem('flarumUserId');
                    localStorage.removeItem('flarumUsername');
                }
                window.location.href = '/';
            };

            avatarTrigger.onclick = function() {
                avatarInput.click();
            };

            avatarTrigger.onkeydown = function(event) {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    avatarInput.click();
                }
            };

            avatarInput.onchange = function() {
                handleAvatarUpload(this);
            };

            profileForm.onsubmit = handleProfileSave;
            passwordForm.onsubmit = handlePasswordSave;

            resetProfileBtn.onclick = function() {
                if (currentProfileContext) {
                    renderProfileEditor(currentProfileContext);
                    showPageMessage('宸叉仮澶嶄负褰撳墠淇濆瓨鐨勮祫鏂欏唴瀹广€?, 'success');
                }
            };

            resetPasswordBtn.onclick = resetPasswordForm;
            openPasswordModalBtn.onclick = openPasswordModal;
            closePasswordModalBtn.onclick = closePasswordModal;

            passwordModal.onclick = function(event) {
                if (event.target === passwordModal) {
                    closePasswordModal();
                }
            };

            tabDiscussions.onclick = function() {
                switchActivityTab('discussions');
            };

            tabComments.onclick = function() {
                switchActivityTab('comments');
            };

            activityPrevBtn.onclick = function() {
                if (activityState.page > 1) {
                    activityState.page -= 1;
                    renderActivitySection();
                }
            };

            activityNextBtn.onclick = function() {
                activityState.page += 1;
                renderActivitySection();
            };
        }

        async function fetchUserData(userId) {
            return await flarumRequest(`/users/${userId}?include=groups`, { auth: true });
        }

        async function fetchUserStats(userId) {
            const stats = { posts: 0, comments: 0, likes: 0, reputation: 0 };

            try {
                const [discussionsData, postsData, userData] = await Promise.all([
                    flarumRequest(`/discussions?filter[author]=${userId}&page[limit]=50`, { auth: true }),
                    flarumRequest(`/posts?filter[author]=${userId}&page[limit]=50`, { auth: true }),
                    flarumRequest(`/users/${userId}`, { auth: true })
                ]);

                stats.posts = discussionsData?.data?.length || 0;
                const totalPosts = postsData?.data?.length || 0;
                stats.comments = Math.max(0, totalPosts - stats.posts);
                stats.reputation = userData?.data?.attributes?.reputation || 0;
                stats.likes = userData?.data?.attributes?.likesCount || 0;
            } catch (error) {
                console.error('鑾峰彇鐢ㄦ埛缁熻澶辫触:', error);
            }

            return stats;
        }

        async function fetchUserDiscussions(userId) {
            try {
                const data = await flarumRequest(`/discussions?filter[author]=${userId}&page[limit]=30&include=user`, { auth: true });
                return data?.data || [];
            } catch (error) {
                console.error('鑾峰彇鐢ㄦ埛甯栧瓙澶辫触:', error);
                return [];
            }
        }

        async function fetchUserComments(userId) {
            try {
                const data = await flarumRequest(`/posts?filter[author]=${userId}&page[limit]=30&include=discussion`, { auth: true });
                const posts = Array.isArray(data?.data) ? data.data : [];
                const comments = posts.filter((post) => Number(post?.attributes?.number) !== 1);
                comments.included = data?.included || [];
                return comments;
            } catch (error) {
                console.error('鑾峰彇鐢ㄦ埛鍥炲澶辫触:', error);
                return [];
            }
        }

        async function handleProfileSave(event) {
            event.preventDefault();

            if (!currentProfileContext) return;

            const saveBtn = document.getElementById('save-profile-btn');
            const nicknameInput = document.getElementById('editor-nickname');
            const signatureInput = document.getElementById('editor-signature');
            const userId = localStorage.getItem('flarumUserId');
            const normalizedNickname = nicknameInput.value.trim();
            const normalizedSignature = signatureInput.value.trim();
            const fallbackNickname = currentProfileContext.username;
            const effectiveNickname = normalizedNickname || fallbackNickname;

            if (effectiveNickname.length > 30) {
                showPageMessage('鏄电О鏈€澶氬彲濉啓 30 涓瓧绗︺€?, 'error');
                nicknameInput.focus();
                return;
            }

            if (normalizedSignature.length > 200) {
                showPageMessage('涓€х鍚嶆渶澶氬彲濉啓 200 涓瓧绗︺€?, 'error');
                signatureInput.focus();
                return;
            }

            const previousEffectiveNickname = currentProfileContext.rawNickname || currentProfileContext.username;
            const nicknameChanged = effectiveNickname !== previousEffectiveNickname;
            const signatureChanged = normalizedSignature !== (currentProfileContext.signature || '');

            if (!nicknameChanged && !signatureChanged) {
                showPageMessage('璧勬枡娌℃湁鍙樺寲锛屾棤闇€閲嶅淇濆瓨銆?, 'success');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = '淇濆瓨涓?..';

            try {
                const attributesToUpdate = {};
                if (nicknameChanged) {
                    attributesToUpdate.nickname = effectiveNickname;
                }
                if (signatureChanged) {
                    attributesToUpdate.signature = normalizedSignature;
                }

                await updateUserAttributes(userId, attributesToUpdate);

                const refreshedUserData = await fetchUserData(userId);
                const refreshedContext = buildProfileContext(refreshedUserData);
                const refreshedEffectiveNickname = refreshedContext.rawNickname || refreshedContext.username;
                const nicknameApplied = !nicknameChanged || refreshedEffectiveNickname === effectiveNickname;
                const signatureApplied = !signatureChanged || (refreshedContext.signature || '') === normalizedSignature;

                if (!nicknameApplied && !signatureApplied) {
                    throw new Error('璧勬枡鏈疄闄呬繚瀛樻垚鍔?);
                }

                localStorage.setItem('flarumUsername', refreshedContext.displayName);
                window.dispatchEvent(new Event('flarum-auth-changed'));

                let successText = '';
                if (nicknameApplied && signatureApplied) {
                    successText = nicknameChanged && signatureChanged
                        ? '鏄电О鍜屼釜鎬х鍚嶅凡淇濆瓨銆?
                        : (nicknameChanged ? '鏄电О宸蹭繚瀛樸€? : '涓€х鍚嶅凡淇濆瓨銆?);
                } else if (nicknameApplied) {
                    successText = '鏄电О宸蹭繚瀛橈紝浣嗕釜鎬х鍚嶆殏鏈敓鏁堬紝鍙兘鏄鍧涘悗绔殏鏈紑鍚瀛楁銆?;
                } else {
                    successText = '涓€х鍚嶅凡淇濆瓨锛屼絾鏄电О鏆傛湭鐢熸晥锛岃绋嶅悗閲嶈瘯銆?;
                }

                pendingProfileMessage = { message: successText, type: nicknameApplied && signatureApplied ? 'success' : 'error' };
                await initProfilePage();
            } catch (error) {
                console.error('淇濆瓨涓汉璧勬枡澶辫触:', error);
                let message = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'profile')
                    : '涓汉璧勬枡淇濆瓨澶辫触锛岃绋嶅悗鍐嶈瘯銆?;
                if (/鏈疄闄呬繚瀛樻垚鍔?.test(String(error?.message || ''))) {
                    message = '璧勬枡鎻愪氦鎴愬姛浜嗭紝浣嗗悗绔病鏈夊疄闄呬繚瀛樿繖娆′慨鏀癸紝璇风◢鍚庨噸璇曟垨鑱旂郴缃戠妫€鏌ュ搴斿瓧娈垫槸鍚﹀凡寮€鍚€?;
                }

                showPageMessage(message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '淇濆瓨璧勬枡';
            }
        }

        async function updateUserAttributes(userId, attributes) {
            return await flarumRequest(`/users/${userId}`, {
                method: 'PATCH',
                auth: true,
                json: {
                    data: {
                        type: 'users',
                        id: String(userId),
                        attributes
                    }
                }
            });
        }

        async function handlePasswordSave(event) {
            event.preventDefault();

            const currentPasswordInput = document.getElementById('current-password');
            const newPasswordInput = document.getElementById('new-password');
            const confirmInput = document.getElementById('confirm-new-password');
            const savePasswordBtn = document.getElementById('save-password-btn');
            const userId = localStorage.getItem('flarumUserId');
            const currentPassword = currentPasswordInput.value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmInput.value;

            if (!currentPassword) {
                showPageMessage('璇疯緭鍏ュ綋鍓嶅瘑鐮佸悗鍐嶄慨鏀广€?, 'error');
                currentPasswordInput.focus();
                return;
            }

            if (!newPassword || newPassword.length < 8) {
                showPageMessage('鏂板瘑鐮侀暱搴﹁嚦灏戦渶瑕?8 浣嶃€?, 'error');
                newPasswordInput.focus();
                return;
            }

            if (!/[a-zA-Z]/.test(newPassword)) {
                showPageMessage('鏂板瘑鐮佸缓璁嚦灏戝寘鍚竴涓瓧姣嶃€?, 'error');
                newPasswordInput.focus();
                return;
            }

            if (newPassword !== confirmPassword) {
                showPageMessage('涓ゆ杈撳叆鐨勬柊瀵嗙爜涓嶄竴鑷淬€?, 'error');
                confirmInput.focus();
                return;
            }

            if (newPassword === currentPassword) {
                showPageMessage('鏂板瘑鐮佷笉鑳戒笌褰撳墠瀵嗙爜瀹屽叏鐩稿悓銆?, 'error');
                newPasswordInput.focus();
                return;
            }

            savePasswordBtn.disabled = true;
            savePasswordBtn.textContent = '鎻愪氦涓?..';

            try {
                await updateUserAttributes(userId, {
                    password: newPassword,
                    currentPassword
                });
                resetPasswordForm();
                closePasswordModal();
                showPageMessage('瀵嗙爜宸叉彁浜や慨鏀癸紝璇蜂娇鐢ㄦ柊瀵嗙爜閲嶆柊鐧诲綍鏃舵敞鎰忓尯鍒嗗ぇ灏忓啓銆?, 'success');
            } catch (error) {
                console.error('淇敼瀵嗙爜澶辫触:', error);
                let message = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'profile')
                    : '瀵嗙爜淇敼澶辫触锛岃绋嶅悗鍐嶈瘯銆?;

                const detail = String(error?.apiError?.detail || error?.detail || '');
                if (/password|currentPassword|validation/i.test(detail)) {
                    message = '瀵嗙爜淇敼澶辫触锛岃纭褰撳墠瀵嗙爜姝ｇ‘锛屽苟妫€鏌ユ柊瀵嗙爜鏄惁绗﹀悎璁哄潧瑕佹眰銆?;
                } else if (error?.httpStatus === 403) {
                    message = '褰撳墠璐﹀彿鏆傛椂娌℃湁淇敼瀵嗙爜鐨勬潈闄愶紝璇风‘璁よ处鍙峰凡婵€娲伙紝濡備粛鏈夐棶棰樿鑱旂郴缃戠銆?;
                }

                showPageMessage(message, 'error');
            } finally {
                savePasswordBtn.disabled = false;
                savePasswordBtn.textContent = '淇敼瀵嗙爜';
            }
        }

        function showPageMessage(message, type) {
            const pageMessage = document.getElementById('page-message');
            pageMessage.textContent = message;
            pageMessage.className = `profile-message ${type || ''}`.trim();
            pageMessage.style.display = 'block';
        }

        function showProfileError(message, showLoginLink) {
            const errorContent = document.getElementById('error-content');
            errorContent.innerHTML = `<p>${escapeHtml(message)}</p>${showLoginLink ? '<p><a href="login.html">鐐瑰嚮鐧诲綍</a></p>' : ''}`;
            errorContent.style.display = 'block';
        }

        function formatProfileDate(value) {
            if (!value) return '鏆傛棤璁板綍';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '鏆傛棤璁板綍';
            const pad = (n) => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function buildPreviewText(rawHtml) {
            const text = String(rawHtml || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
            if (!text) return '';
            return text.length > 70 ? `${text.slice(0, 70)}...` : text;
        }

        function switchActivityTab(tabName) {
            if (activityState.activeTab === tabName) return;
            activityState.activeTab = tabName;
            activityState.page = 1;
            renderActivitySection();
        }

        function resetPasswordForm() {
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-new-password').value = '';
        }

        function openPasswordModal() {
            const modal = document.getElementById('password-modal');
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            setTimeout(() => {
                const currentPasswordInput = document.getElementById('current-password');
                if (currentPasswordInput) currentPasswordInput.focus();
            }, 0);
        }

        function closePasswordModal() {
            const modal = document.getElementById('password-modal');
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            resetPasswordForm();
        }

        function maskEmail(email) {
            const raw = String(email || '').trim();
            if (!raw || raw === '-') return '-';
            const parts = raw.split('@');
            if (parts.length !== 2) return raw;
            const name = parts[0];
            if (name.length <= 2) {
                return `${name[0] || '*'}***@${parts[1]}`;
            }
            return `${name.slice(0, 2)}***@${parts[1]}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function handleAvatarUpload(input) {
            const file = input.files && input.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showPageMessage('璇烽€夋嫨鍥剧墖鏂囦欢鍚庡啀涓婁紶澶村儚銆?, 'error');
                input.value = '';
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                showPageMessage('澶村儚鍥剧墖澶у皬涓嶈兘瓒呰繃 2MB銆?, 'error');
                input.value = '';
                return;
            }

            const userId = localStorage.getItem('flarumUserId');
            const token = typeof getFlarumToken === 'function' ? getFlarumToken() : localStorage.getItem('flarumToken');
            const avatarContainer = document.getElementById('avatar-trigger');

            try {
                avatarContainer.style.opacity = '0.6';
                avatarContainer.style.cursor = 'wait';

                const formData = new FormData();
                formData.append('avatar', file);

                const response = await fetch(`/api/users/${userId}/avatar`, {
                    method: 'POST',
                    headers: {
                        Authorization: `Token ${token}; userId=${userId}`
                    },
                    body: formData
                });

                if (!response.ok) {
                    let detail = '';
                    try {
                        const errorJson = await response.json();
                        detail = JSON.stringify(errorJson);
                    } catch {
                        detail = await response.text();
                    }
                    const error = new Error('澶村儚涓婁紶澶辫触');
                    error.detail = detail;
                    error.httpStatus = response.status;
                    throw error;
                }

                pendingProfileMessage = { message: '澶村儚涓婁紶鎴愬姛锛岃祫鏂欓〉宸插埛鏂般€?, type: 'success' };
                await initProfilePage();
            } catch (error) {
                console.error('涓婁紶澶村儚澶辫触:', error);
                const friendlyMessage = typeof getFriendlyErrorMessage === 'function'
                    ? getFriendlyErrorMessage(error, 'upload_avatar')
                    : '澶村儚涓婁紶澶辫触锛岃绋嶅悗鍐嶈瘯銆?;
                showPageMessage(friendlyMessage, 'error');
            } finally {
                avatarContainer.style.opacity = '1';
                avatarContainer.style.cursor = 'pointer';
                input.value = '';
            }
        }
    </script>
