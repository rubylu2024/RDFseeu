<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flarum API 测试</title>
    <link rel="icon" type="image/png" href="images/红蜻蜓.png">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        pre { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>
    <h1>Flarum API 杩炴帴娴嬭瘯</h1>
    <div id="test-results"></div>

    <script>
        const FLARUM_BASE_URL = 'https://www.reddragonfly.cyou/';

        function isFlarumConfigured() {
            return typeof FLARUM_BASE_URL === 'string' && FLARUM_BASE_URL.trim().length > 0;
        }

        function getFlarumApiBase() {
            return FLARUM_BASE_URL.replace(/\/+$/, '') + '/api';
        }

        function getFriendlyTestErrorMessage(error, context) {
            const rawMessage = String(error?.message || '');
            if (/Failed to fetch|NetworkError|Load failed/i.test(rawMessage)) {
                return '鏃犳硶杩炴帴璁哄潧鎺ュ彛锛岃妫€鏌ョ綉缁滄垨鏈嶅姟鍣ㄧ姸鎬併€?;
            }

            if (/401/.test(rawMessage)) {
                return '鎺ュ彛闇€瑕佺櫥褰曞悗鎵嶈兘璁块棶锛屽綋鍓嶆湭鎻愪緵鐧诲綍鐘舵€併€?;
            }

            if (/403/.test(rawMessage)) {
                return context === 'list'
                    ? '褰撳墠璐﹀彿鎴栧綋鍓嶈闂柟寮忔病鏈夎幏鍙栧笘瀛愬垪琛ㄧ殑鏉冮檺銆?
                    : '褰撳墠璐﹀彿鎴栧綋鍓嶈闂柟寮忔病鏈夎闂鎺ュ彛鐨勬潈闄愩€?;
            }

            if (/404/.test(rawMessage)) {
                return '璇锋眰鐨勬帴鍙ｅ湴鍧€涓嶅瓨鍦紝璇锋鏌ヨ鍧涙帴鍙ｉ厤缃€?;
            }

            if (/5\d\d/.test(rawMessage)) {
                return '璁哄潧鏈嶅姟鍣ㄦ殏鏃剁箒蹇欙紝璇风◢鍚庡啀璇曘€?;
            }

            return '鎺ュ彛璇锋眰澶辫触锛岃绋嶅悗鍐嶈瘯銆?;
        }

        async function flarumRequest(path, options = {}) {
            const apiBase = getFlarumApiBase();
            const url = apiBase + (path.startsWith('/') ? path : '/' + path);
            const headers = { Accept: 'application/vnd.api+json', ...options.headers };

            if (options.json !== undefined) {
                headers['Content-Type'] = 'application/vnd.api+json';
            }

            const response = await fetch(url, {
                method: options.method || 'GET',
                headers,
                body: options.json !== undefined ? JSON.stringify(options.json) : options.body
            });

            if (!response.ok) {
                throw new Error(`Flarum API 璇锋眰澶辫触: ${response.status} ${response.statusText}`);
            }

            if (response.status === 204) return null;
            return await response.json();
        }

        async function runTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';

            addResult('娴嬭瘯 1: 妫€鏌?Flarum 閰嶇疆', isFlarumConfigured() ? '鎴愬姛' : '澶辫触');

            if (!isFlarumConfigured()) {
                addResult('閿欒', '澶辫触', 'Flarum 閰嶇疆鏈畬鎴?);
                return;
            }

            try {
                const discussions = await flarumRequest('/discussions?sort=-createdAt&page[limit]=5&include=user');
                addResult('娴嬭瘯 2: 鑾峰彇璁ㄨ鍒楄〃', '鎴愬姛', discussions);
            } catch (error) {
                addResult('娴嬭瘯 2: 鑾峰彇璁ㄨ鍒楄〃', '澶辫触', getFriendlyTestErrorMessage(error, 'list'));
            }

            try {
                const info = await flarumRequest('/');
                addResult('娴嬭瘯 3: 鑾峰彇 API 淇℃伅', '鎴愬姛', info);
            } catch (error) {
                addResult('娴嬭瘯 3: 鑾峰彇 API 淇℃伅', '澶辫触', getFriendlyTestErrorMessage(error, 'info'));
            }
        }

        function addResult(testName, status, details = null) {
            const resultsDiv = document.getElementById('test-results');
            const div = document.createElement('div');
            div.className = `test-result ${status === '鎴愬姛' ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${testName}</strong>: ${status}`;
            if (details) {
                const detailBlock = document.createElement('pre');
                detailBlock.textContent = typeof details === 'object' ? JSON.stringify(details, null, 2) : details;
                div.appendChild(detailBlock);
            }
            resultsDiv.appendChild(div);
        }

        window.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
