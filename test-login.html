<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }

        pre {
            background-color: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
            border-radius: 3px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Flarum 登录测试</h1>

    <div class="test-section">
        <h3>1. 测试 API 连通性</h3>
        <button onclick="testApiConnectivity()">测试 API 连通性</button>
        <pre id="connectivity-result">等待测试...</pre>
    </div>

    <div class="test-section">
        <h3>2. 测试获取 Token</h3>
        <div>
            <input type="text" id="test-username" placeholder="用户名或邮箱">
            <input type="password" id="test-password" placeholder="密码">
        </div>
        <button onclick="testLogin()">测试登录</button>
        <pre id="login-result">等待测试...</pre>
    </div>

    <div class="test-section">
        <h3>3. 检查 CORS 配置</h3>
        <button onclick="checkCors()">检查 CORS</button>
        <pre id="cors-result">等待测试...</pre>
    </div>

    <script>
        const API_BASE = '/api';

        function getFriendlyTestErrorMessage(error, context) {
            const rawMessage = String(error?.message || '');
            if (/Failed to fetch|NetworkError|Load failed/i.test(rawMessage)) {
                return '无法连接论坛接口，请检查网络或服务器状态。';
            }

            if (/401/.test(rawMessage)) {
                return context === 'login'
                    ? '账号或密码不正确，登录被拒绝。'
                    : '当前访问未通过身份验证。';
            }

            if (/403/.test(rawMessage)) {
                return '当前账号或当前访问方式没有执行该操作的权限。';
            }

            if (/404/.test(rawMessage)) {
                return '请求的接口地址不存在，请检查论坛接口配置。';
            }

            if (/5\\d\\d/.test(rawMessage)) {
                return '论坛服务器暂时繁忙，请稍后再试。';
            }

            return '请求失败，请稍后再试。';
        }

        async function testApiConnectivity() {
            const resultEl = document.getElementById('connectivity-result');
            try {
                const response = await fetch(API_BASE + '/discussions', {
                    method: 'GET',
                    headers: { Accept: 'application/vnd.api+json' }
                });
                resultEl.textContent = `状态: ${response.status} ${response.statusText}\n`;
                resultEl.textContent += `CORS: ${response.headers.get('Access-Control-Allow-Origin') || '未配置'}\n`;
                const data = await response.json();
                resultEl.textContent += `数据: ${JSON.stringify(data, null, 2).substring(0, 500)}...`;
                resultEl.parentElement.className = 'test-section success';
            } catch (error) {
                resultEl.textContent = getFriendlyTestErrorMessage(error, 'connectivity');
                resultEl.parentElement.className = 'test-section error';
            }
        }

        async function testLogin() {
            const username = document.getElementById('test-username').value;
            const password = document.getElementById('test-password').value;
            const resultEl = document.getElementById('login-result');

            if (!username || !password) {
                resultEl.textContent = '请输入用户名和密码';
                return;
            }

            try {
                const response = await fetch(API_BASE + '/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Accept: 'application/vnd.api+json'
                    },
                    body: JSON.stringify({ identification: username, password })
                });

                resultEl.textContent = `状态: ${response.status} ${response.statusText}\n`;
                resultEl.textContent += `CORS: ${response.headers.get('Access-Control-Allow-Origin') || '未配置'}\n`;

                const text = await response.text();
                resultEl.textContent += `响应内容: ${text.substring(0, 500)}\n`;

                if (response.ok) {
                    const data = JSON.parse(text);
                    if (data.token) {
                        resultEl.textContent += `\n登录成功，Token: ${data.token.substring(0, 20)}...`;
                        resultEl.parentElement.className = 'test-section success';
                    } else {
                        resultEl.textContent += '\n响应中没有 token';
                        resultEl.parentElement.className = 'test-section error';
                    }
                } else {
                    resultEl.parentElement.className = 'test-section error';
                }
            } catch (error) {
                resultEl.textContent = `${getFriendlyTestErrorMessage(error, 'login')}\n如果你是跨域访问，也可能是浏览器拦截了请求。`;
                resultEl.parentElement.className = 'test-section error';
            }
        }

        async function checkCors() {
            const resultEl = document.getElementById('cors-result');
            try {
                const response = await fetch(API_BASE + '/discussions', { method: 'OPTIONS' });
                resultEl.textContent = `预检请求状态: ${response.status}\n`;
                resultEl.textContent += `Access-Control-Allow-Origin: ${response.headers.get('Access-Control-Allow-Origin') || '未配置'}\n`;
                resultEl.textContent += `Access-Control-Allow-Methods: ${response.headers.get('Access-Control-Allow-Methods') || '未配置'}\n`;
                resultEl.textContent += `Access-Control-Allow-Headers: ${response.headers.get('Access-Control-Allow-Headers') || '未配置'}\n`;

                if (!response.headers.get('Access-Control-Allow-Origin')) {
                    resultEl.textContent += '\n警告: CORS 未配置，这可能导致跨域请求失败';
                    resultEl.parentElement.className = 'test-section error';
                } else {
                    resultEl.parentElement.className = 'test-section success';
                }
            } catch (error) {
                resultEl.textContent = getFriendlyTestErrorMessage(error, 'cors');
                resultEl.parentElement.className = 'test-section error';
            }
        }
    </script>
</body>
</html>
