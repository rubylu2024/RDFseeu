<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <link rel="icon" type="image/png" href="images/红蜻蜓.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }

        pre {
            background-color: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
            border-radius: 3px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Flarum 鐧诲綍娴嬭瘯</h1>

    <div class="test-section">
        <h3>1. 娴嬭瘯 API 杩為€氭€?/h3>
        <button onclick="testApiConnectivity()">娴嬭瘯 API 杩為€氭€?/button>
        <pre id="connectivity-result">绛夊緟娴嬭瘯...</pre>
    </div>

    <div class="test-section">
        <h3>2. 娴嬭瘯鑾峰彇 Token</h3>
        <div>
            <input type="text" id="test-username" placeholder="鐢ㄦ埛鍚嶆垨閭">
            <input type="password" id="test-password" placeholder="瀵嗙爜">
        </div>
        <button onclick="testLogin()">娴嬭瘯鐧诲綍</button>
        <pre id="login-result">绛夊緟娴嬭瘯...</pre>
    </div>

    <div class="test-section">
        <h3>3. 妫€鏌?CORS 閰嶇疆</h3>
        <button onclick="checkCors()">妫€鏌?CORS</button>
        <pre id="cors-result">绛夊緟娴嬭瘯...</pre>
    </div>

    <script>
        const API_BASE = '/api';

        function getFriendlyTestErrorMessage(error, context) {
            const rawMessage = String(error?.message || '');
            if (/Failed to fetch|NetworkError|Load failed/i.test(rawMessage)) {
                return '鏃犳硶杩炴帴璁哄潧鎺ュ彛锛岃妫€鏌ョ綉缁滄垨鏈嶅姟鍣ㄧ姸鎬併€?;
            }

            if (/401/.test(rawMessage)) {
                return context === 'login'
                    ? '璐﹀彿鎴栧瘑鐮佷笉姝ｇ‘锛岀櫥褰曡鎷掔粷銆?
                    : '褰撳墠璁块棶鏈€氳繃韬唤楠岃瘉銆?;
            }

            if (/403/.test(rawMessage)) {
                return '褰撳墠璐﹀彿鎴栧綋鍓嶈闂柟寮忔病鏈夋墽琛岃鎿嶄綔鐨勬潈闄愩€?;
            }

            if (/404/.test(rawMessage)) {
                return '璇锋眰鐨勬帴鍙ｅ湴鍧€涓嶅瓨鍦紝璇锋鏌ヨ鍧涙帴鍙ｉ厤缃€?;
            }

            if (/5\\d\\d/.test(rawMessage)) {
                return '璁哄潧鏈嶅姟鍣ㄦ殏鏃剁箒蹇欙紝璇风◢鍚庡啀璇曘€?;
            }

            return '璇锋眰澶辫触锛岃绋嶅悗鍐嶈瘯銆?;
        }

        async function testApiConnectivity() {
            const resultEl = document.getElementById('connectivity-result');
            try {
                const response = await fetch(API_BASE + '/discussions', {
                    method: 'GET',
                    headers: { Accept: 'application/vnd.api+json' }
                });
                resultEl.textContent = `鐘舵€? ${response.status} ${response.statusText}\n`;
                resultEl.textContent += `CORS: ${response.headers.get('Access-Control-Allow-Origin') || '鏈厤缃?}\n`;
                const data = await response.json();
                resultEl.textContent += `鏁版嵁: ${JSON.stringify(data, null, 2).substring(0, 500)}...`;
                resultEl.parentElement.className = 'test-section success';
            } catch (error) {
                resultEl.textContent = getFriendlyTestErrorMessage(error, 'connectivity');
                resultEl.parentElement.className = 'test-section error';
            }
        }

        async function testLogin() {
            const username = document.getElementById('test-username').value;
            const password = document.getElementById('test-password').value;
            const resultEl = document.getElementById('login-result');

            if (!username || !password) {
                resultEl.textContent = '璇疯緭鍏ョ敤鎴峰悕鍜屽瘑鐮?;
                return;
            }

            try {
                const response = await fetch(API_BASE + '/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Accept: 'application/vnd.api+json'
                    },
                    body: JSON.stringify({ identification: username, password })
                });

                resultEl.textContent = `鐘舵€? ${response.status} ${response.statusText}\n`;
                resultEl.textContent += `CORS: ${response.headers.get('Access-Control-Allow-Origin') || '鏈厤缃?}\n`;

                const text = await response.text();
                resultEl.textContent += `鍝嶅簲鍐呭: ${text.substring(0, 500)}\n`;

                if (response.ok) {
                    const data = JSON.parse(text);
                    if (data.token) {
                        resultEl.textContent += `\n鐧诲綍鎴愬姛锛孴oken: ${data.token.substring(0, 20)}...`;
                        resultEl.parentElement.className = 'test-section success';
                    } else {
                        resultEl.textContent += '\n鍝嶅簲涓病鏈?token';
                        resultEl.parentElement.className = 'test-section error';
                    }
                } else {
                    resultEl.parentElement.className = 'test-section error';
                }
            } catch (error) {
                resultEl.textContent = `${getFriendlyTestErrorMessage(error, 'login')}\n濡傛灉浣犳槸璺ㄥ煙璁块棶锛屼篃鍙兘鏄祻瑙堝櫒鎷︽埅浜嗚姹傘€俙;
                resultEl.parentElement.className = 'test-section error';
            }
        }

        async function checkCors() {
            const resultEl = document.getElementById('cors-result');
            try {
                const response = await fetch(API_BASE + '/discussions', { method: 'OPTIONS' });
                resultEl.textContent = `棰勬璇锋眰鐘舵€? ${response.status}\n`;
                resultEl.textContent += `Access-Control-Allow-Origin: ${response.headers.get('Access-Control-Allow-Origin') || '鏈厤缃?}\n`;
                resultEl.textContent += `Access-Control-Allow-Methods: ${response.headers.get('Access-Control-Allow-Methods') || '鏈厤缃?}\n`;
                resultEl.textContent += `Access-Control-Allow-Headers: ${response.headers.get('Access-Control-Allow-Headers') || '鏈厤缃?}\n`;

                if (!response.headers.get('Access-Control-Allow-Origin')) {
                    resultEl.textContent += '\n璀﹀憡: CORS 鏈厤缃紝杩欏彲鑳藉鑷磋法鍩熻姹傚け璐?;
                    resultEl.parentElement.className = 'test-section error';
                } else {
                    resultEl.parentElement.className = 'test-section success';
                }
            } catch (error) {
                resultEl.textContent = getFriendlyTestErrorMessage(error, 'cors');
                resultEl.parentElement.className = 'test-section error';
            }
        }
    </script>
</body>
</html>
