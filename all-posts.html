<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部帖子 - 红蜻蜓论坛</title>
    <link rel="stylesheet" href="styles.css?v=20260506-2">
    <style>
        .page-shell {
            width: 100%;
        }

        .all-posts-card {
            background: #fff;
            border: 1px solid #ccc;
            padding: 14px;
        }

        .all-posts-head {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 12px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .all-posts-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-right: auto;
        }

        .all-posts-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .all-posts-controls label {
            font-size: 13px;
            color: #666;
        }

        .all-posts-controls select {
            padding: 4px 6px;
            border: 1px solid #bbb;
            background: #fff;
            font-size: 13px;
        }

        .all-posts-controls button {
            padding: 5px 10px;
            border: 1px solid #6F6F6F;
            background: linear-gradient(to bottom, #DEDEDE, #C2C2C2);
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        .all-posts-controls button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .all-posts-meta {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .all-posts-error {
            padding: 12px;
            border: 1px dashed #cc0000;
            background: #fff7f7;
            color: #cc0000;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <audio id="background-music" src="audio/红蜻蜓.mp3" loop>
        Your browser does not support the audio element.
    </audio>

    <div class="forum-frame-outer">
        <div class="forum-content">
            <div class="forum-frame">
                <div class="top-nav">
                    <div class="top-nav-container">
                        <div class="logo">
                            <div class="logo-image"></div>
                            <a href="index.html">红蜻蜓论坛</a>
                            <a href="index.html" class="logo-sub">www.reddragonfly.cyou</a>
                        </div>
                        <div class="top-links">
                            <a href="index.html">论坛</a>
                            <a href="#">博客</a>
                            <a href="#">问答</a>
                            <a href="https://www.4399.com" target="_blank">游戏厅</a>
                            <a href="#">品牌</a>
                            <a href="#">更多</a>
                        </div>
                        <div class="search-box">
                            <input type="text" placeholder="搜帖、找人、搜版块">
                            <button>搜索</button>
                        </div>
                        <div class="user-links">
                            <button id="audio-toggle" class="audio-toggle">
                                <span class="audio-icon">♪</span>
                            </button>
                            <a href="#">服务</a>
                            <div id="user-links-container">
                                <a href="login.html" id="login-btn">登录</a>
                                <a href="register.html" id="register-btn">注册</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="main-container">
                    <div class="right-content-area page-shell">
                        <div class="content-wrapper">
                            <div class="main-content" style="width:100%; padding: 20px;">
                                <div class="all-posts-card">
                                    <div class="all-posts-head">
                                        <div class="all-posts-title">&gt; 全部帖子</div>
                                        <div class="all-posts-controls">
                                            <label for="all-posts-sort-field">排序</label>
                                            <select id="all-posts-sort-field">
                                                <option value="createdAt">发布时间</option>
                                                <option value="views">浏览量</option>
                                            </select>
                                            <select id="all-posts-sort-order">
                                                <option value="desc">倒序</option>
                                                <option value="asc">正序</option>
                                            </select>
                                            <button type="button" id="all-posts-prev">上一页</button>
                                            <button type="button" id="all-posts-next">下一页</button>
                                        </div>
                                    </div>
                                    <div class="all-posts-meta" id="all-posts-meta">每页最多 15 条</div>
                                    <div class="all-posts-error" id="all-posts-error"></div>
                                    <div id="all-posts-table-wrap">
                                        <div style="padding: 20px; text-align: center;">加载中...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-container">
                    <span>我的红蜻蜓</span>
                    <span class="status-right" style="position: relative; cursor: pointer;" onclick="window.location.href='message.html'">消息中心<span class="unread-badge" style="display:none;">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260507-8"></script>
</body>
</html>
