<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - 入口</title>
    <link rel="icon" type="image/png" href="images/红蜻蜓.png">
    <link rel="stylesheet" href="styles.css?v=20260506-2">
    <style>
        .blog-page {
            width: 96vw;
            max-width: 1600px;
            margin: 20px auto;
        }

        .blog-shell {
            background: #fff;
            border: 1px solid #ccc;
            line-height: 1.8;
            padding: 10px 0;
        }

        .blog-body {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 0 10px;
            max-width: 980px;
            margin: 0 auto;
        }

        .sidebox {
            border: 1px solid #e6d3db;
            background: #fff;
            margin-bottom: 10px;
            text-align: center;
        }

        .sidebox-title {
            padding: 8px 10px;
            background: #fff0f7;
            border-bottom: 1px solid #e6d3db;
            color: #b63a7a;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }

        .sidebox-body {
            padding: 10px;
            font-size: 12px;
            color: #444;
        }

        .mainbox {
            border: 1px solid #e6d3db;
            background: #fff;
            text-align: center;
        }

        .entry {
            padding: 12px 14px;
        }

        .entry h2 {
            margin: 0 0 6px;
            font-size: 16px;
            color: #b63a7a;
            font-weight: bold;
            text-align: center;
        }

        .entry-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }

        .blog-id-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .blog-id-form input[type="text"] {
            width: min(680px, 100%);
            padding: 8px 10px;
            border: 1px solid #6F6F6F;
            background: #fff;
            font-size: 14px;
        }

        .blog-id-form button {
            padding: 8px 14px;
            border: 1px solid #6F6F6F;
            background: linear-gradient(to bottom, #DEDEDE, #C2C2C2);
            color: #333;
            cursor: pointer;
            font-size: 14px;
            align-self: center;
        }

        .blog-error {
            margin-top: 10px;
            color: #cc0000;
            font-size: 13px;
            min-height: 18px;
            text-align: center;
        }

        .blog-entry-hint {
            background: #fff9c4;
            border: 1px solid #fbc02d;
            padding: 10px 12px;
            border-radius: 4px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="blog-page">
        <div class="blog-shell">
            <div class="blog-body">
                <div class="sidebox">
                    <div class="sidebox-title">提示</div>
                    <div class="sidebox-body">
                        <div class="blog-entry-hint">请输入要查看的博客ID。</div>
                    </div>
                </div>

                <div class="mainbox">
                    <div class="entry">
                        <h2>请输入要查看的博客ID</h2>

                        <form class="blog-id-form" id="blog-id-form" autocomplete="off">
                            <input id="blog-id-input" type="text" inputmode="latin" spellcheck="false" aria-label="博客ID">
                            <button type="submit">进入</button>
                        </form>
                        <div class="blog-error" id="blog-error"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const form = document.getElementById('blog-id-form');
            const input = document.getElementById('blog-id-input');
            const errorEl = document.getElementById('blog-error');
            if (!form || !input || !errorEl) return;

            const urlParams = new URLSearchParams(window.location.search);
            const preset = urlParams.get('id') || 'xiaoyu';
            input.value = preset;
            input.focus();
            input.select();

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                const raw = String(input.value || '').trim();
                const normalized = raw.toLowerCase();

                if (normalized === 'xiaoyu') {
                    window.location.href = 'blog-xiaoyu.html';
                    return;
                }

                errorEl.textContent = 'ID不存在';
            });
        })();
    </script>
</body>
</html>
